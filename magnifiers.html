<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>🔍 돋보기 시안 10가지</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css" />
<style>
  :root {
    --moss: #6B8E5A;
    --leaf-deep: #4A6B3F;
    --paper: #F5F1E6;
    --ivory: #FFFCF2;
    --greige: #9C8E7C;
    --gold: #D4AF37;
    --ink: #2D3A26;
    --ink-soft: #5A6B4F;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 1080px;
    margin: 0 auto;
    padding: 32px 16px 80px;
  }
  header {
    text-align: center;
    margin-bottom: 28px;
  }
  header .eyebrow {
    font-size: 12px;
    color: var(--moss);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 10px;
  }
  header h1 {
    font-size: 24px;
    font-weight: 700;
    margin: 0 0 10px;
    letter-spacing: -0.02em;
  }
  header p {
    font-size: 13px;
    color: var(--ink-soft);
    margin: 0;
    line-height: 1.55;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }
  @media (min-width: 700px) {
    .grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (min-width: 1000px) {
    .grid { grid-template-columns: repeat(4, 1fr); }
  }

  .card {
    background: var(--ivory);
    border: 1px solid rgba(107, 142, 90, 0.15);
    border-radius: 16px;
    padding: 14px;
    box-shadow: 0 4px 16px rgba(74, 107, 63, 0.05);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .card .head {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .card .ver {
    font-size: 10px;
    color: var(--greige);
    letter-spacing: 0.12em;
    font-weight: 600;
  }
  .card .name {
    font-size: 13px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .card .desc {
    font-size: 10px;
    color: var(--ink-soft);
    line-height: 1.4;
  }
  .stage {
    aspect-ratio: 1;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    background:
      radial-gradient(ellipse 60% 50% at 25% 25%, #D4B080, transparent 65%),
      radial-gradient(ellipse at 80% 80%, #A8855A, transparent 60%),
      linear-gradient(160deg, #C29766 0%, #8E6E48 100%);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .stage::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 30% 40%, #88C25A 0, transparent 8%),
      radial-gradient(circle at 60% 70%, #9CD06E 0, transparent 8%),
      radial-gradient(circle at 75% 30%, #AFDC82 0, transparent 7%),
      radial-gradient(circle at 25% 75%, #74AC48 0, transparent 7%);
    background-size: 60px 60px, 70px 70px, 50px 50px, 80px 80px;
    pointer-events: none;
    opacity: 0.4;
  }
  .magnifier {
    position: relative;
    z-index: 2;
  }
</style>
</head>
<body>

<div class="wrap">

<header>
  <div class="eyebrow">MAGNIFIER VARIANTS</div>
  <h1>🔍 돋보기 시안 10가지</h1>
  <p>다양한 스타일의 돋보기 — 각 시안은 흙·클로버 배경 위에서 보입니다.<br/>마음에 드는 번호 알려주시면 게임에 적용합니다.</p>
</header>

<div class="grid" id="grid"></div>

</div>

const grid = document.getElementById('grid');
grid.innerHTML = variants.map(v => `
  <div class="card">
    <div class="head"><span class="ver">${v.ver}</span><span class="name">${v.name}</span></div>
    <div class="desc">${v.desc}</div>
    <div class="stage">
      <div class="magnifier">${v.svg}</div>
    </div>
  </div>
`).join('');
</script>

</body>
</html>
