<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>🍀 오늘의 행운 — 플레이 (Real)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css" />
<style>
  :root {
    --moss: #6B8E5A;
    --sprout: #8FBC8F;
    --leaf-deep: #4A6B3F;
    --leaf-darker: #3A5530;
    --beige: #FAF7F0;
    --ivory: #FFFCF2;
    --paper: #F5F1E6;
    --greige: #9C8E7C;
    --gold: #D4AF37;
    --gold-soft: #E5C76B;
    --ink: #2D3A26;
    --ink-soft: #5A6B4F;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
  html, body { margin: 0; padding: 0; height: 100%; overscroll-behavior: none; }
  body {
    font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
    background: var(--paper);
    color: var(--ink);
    display: flex;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  button { font-family: inherit; cursor: pointer; }

  #app {
    width: 100%;
    max-width: 420px;
    min-height: 100vh;
    position: relative;
    overflow: hidden;
  }

  /* ============================================================
     HOME
  ============================================================ */
  .home {
    width: 100%;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(143,188,143,0.18), transparent 55%),
      radial-gradient(ellipse at 50% 100%, rgba(212,175,55,0.05), transparent 60%),
      var(--ivory);
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .home::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(155, 142, 124, 0.04) 0, transparent 1px),
      radial-gradient(circle at 60% 70%, rgba(155, 142, 124, 0.04) 0, transparent 1px),
      radial-gradient(circle at 85% 20%, rgba(155, 142, 124, 0.04) 0, transparent 1px);
    background-size: 60px 60px, 80px 80px, 100px 100px;
    pointer-events: none;
    opacity: 0.6;
  }

  .home-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 24px 12px;
    position: relative;
    z-index: 1;
  }
  .home-header .brand {
    font-size: 13px;
    color: var(--ink-soft);
    font-weight: 500;
  }
  .icon-btn {
    width: 40px; height: 40px;
    border-radius: 12px;
    background: rgba(143, 188, 143, 0.18);
    border: none;
    display: flex; align-items: center; justify-content: center;
    color: var(--leaf-deep);
    font-size: 16px;
  }

  .hero {
    padding: 26px 28px 0;
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .hero .eyebrow {
    font-size: 12px;
    letter-spacing: 0.18em;
    color: var(--moss);
    text-transform: uppercase;
    margin-bottom: 12px;
    font-weight: 600;
  }
  .hero h1 {
    font-size: 26px;
    font-weight: 700;
    line-height: 1.4;
    letter-spacing: -0.02em;
    margin: 0 0 12px;
  }
  .hero p {
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.65;
    margin: 0 auto;
    max-width: 280px;
  }

  .illust {
    margin: 24px auto 4px;
    width: 200px; height: 200px;
    position: relative;
  }
  .illust .glow {
    position: absolute; inset: 30px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212,175,55,0.18), transparent 65%);
  }
  .illust svg { width: 100%; height: 100%; overflow: visible; position: relative; z-index: 1; }
  .illust .leaf-anim { animation: float 4s ease-in-out infinite; transform-origin: center; }
  .illust .leaf-2 { animation-delay: -1s; }
  .illust .leaf-3 { animation-delay: -2s; }
  .illust .leaf-4 { animation-delay: -3s; }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }

  .ticket-card {
    margin: 8px 24px 0;
    background: var(--ivory);
    border: 1px solid rgba(107, 142, 90, 0.15);
    border-radius: 18px;
    padding: 18px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 12px rgba(74, 107, 63, 0.04);
    position: relative;
    z-index: 1;
  }
  .ticket-card .label {
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 4px;
  }
  .ticket-card .count {
    font-size: 22px;
    font-weight: 700;
    color: var(--leaf-deep);
  }
  .ticket-card .count .total {
    color: var(--greige);
    font-weight: 400;
    font-size: 16px;
  }
  .dots { display: flex; gap: 6px; }
  .dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--moss);
    box-shadow: 0 1px 3px rgba(107, 142, 90, 0.4);
    transition: all .3s;
  }
  .dot.spent { background: rgba(155, 142, 124, 0.2); box-shadow: none; }

  .cta-wrap {
    padding: 20px 24px 0;
    position: relative;
    z-index: 1;
  }
  .cta {
    width: 100%;
    height: 60px;
    border: none;
    border-radius: 18px;
    background: linear-gradient(135deg, var(--moss), var(--leaf-deep));
    color: white;
    font-size: 17px;
    font-weight: 600;
    box-shadow: 0 4px 16px rgba(74, 107, 63, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.2);
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: transform .12s;
  }
  .cta:active { transform: translateY(1px); }
  .cta.gold {
    background: linear-gradient(135deg, var(--gold), var(--gold-soft));
    color: var(--leaf-deep);
  }
  .cta.weak {
    background: rgba(107, 142, 90, 0.1);
    color: var(--ink-soft);
    box-shadow: none;
    height: 52px;
    font-size: 15px;
  }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    padding: 24px 24px 16px;
    margin-top: auto;
    position: relative;
    z-index: 1;
  }
  .stat {
    background: rgba(143, 188, 143, 0.1);
    border-radius: 14px;
    padding: 14px 12px;
    text-align: center;
  }
  .stat .v { font-size: 18px; font-weight: 700; color: var(--leaf-deep); }
  .stat .l { font-size: 11px; color: var(--ink-soft); margin-top: 4px; }

  .home-hint {
    text-align: center;
    font-size: 11px;
    color: var(--greige);
    padding: 4px 24px 24px;
    position: relative;
    z-index: 1;
  }

  /* Petals */
  .petal {
    position: absolute;
    pointer-events: none;
    opacity: 0.4;
  }

  /* ============================================================
     GAME
  ============================================================ */
  .game {
    width: 100%;
    height: 100vh;
    position: relative;
    overflow: hidden;
    /* F6: 봄 잔디 + 황금톤 — bright spring meadow with warm gold patches */
    background:
      radial-gradient(ellipse 50% 40% at 20% 20%, rgba(168, 220, 133, 0.5), transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 85%, rgba(125, 168, 90, 0.45), transparent 60%),
      radial-gradient(ellipse 40% 30% at 60% 50%, rgba(212, 175, 55, 0.15), transparent 65%),
      radial-gradient(ellipse at 20% 20%, #88B964 0%, transparent 55%),
      radial-gradient(ellipse at 80% 85%, #5A8042 0%, transparent 55%),
      linear-gradient(160deg, #7DAA5A 0%, #557E38 100%);
    touch-action: none;
    cursor: crosshair;
  }
  /* Background grass layer (behind clovers) */
  .grass-bg, .grass-fg {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .grass-bg { z-index: 1; }
  .grass-fg { z-index: 3; }
  .grass-blade {
    position: absolute;
    transform-origin: bottom center;
    pointer-events: none;
  }
  .game::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 12% 22%, rgba(255,255,255,0.06) 0, transparent 1.5px),
      radial-gradient(circle at 47% 67%, rgba(255,255,255,0.04) 0, transparent 1.5px),
      radial-gradient(circle at 78% 32%, rgba(0,0,0,0.05) 0, transparent 2px);
    background-size: 90px 90px, 110px 110px, 70px 70px;
    pointer-events: none;
    opacity: 0.7;
  }
  .game-hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 18px 22px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 30;
    background: linear-gradient(to bottom, rgba(0,0,0,0.15), transparent);
    pointer-events: none;
  }
  .timer-pill, .ticket-mini, .quit-btn {
    background: rgba(255, 252, 242, 0.92);
    border-radius: 999px;
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    font-size: 13px;
    color: var(--leaf-deep);
    font-weight: 600;
    pointer-events: auto;
    border: none;
  }
  .timer-pill {
    padding: 8px 18px 8px 14px;
  }
  .timer-pill .ring {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2px solid var(--moss);
    border-right-color: rgba(107,142,90,0.2);
    border-bottom-color: rgba(107,142,90,0.2);
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .timer-pill .time { font-size: 16px; font-variant-numeric: tabular-nums; }
  .timer-pill.warn .time { color: #C92A2A; }
  .quit-btn {
    background: rgba(255, 252, 242, 0.7);
    color: var(--ink-soft);
    font-size: 12px;
  }

  .field {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 2;
  }
  /* Reference style: hover-highlight nearest clover (no magnifier, no zoom layer) */
  .clover svg { shape-rendering: geometricPrecision; }
  .clover {
    position: absolute;
    transform-origin: center;
    pointer-events: none;
    transition: transform .15s ease;
  }
  .clover svg {
    filter: drop-shadow(0 1px 1.5px rgba(0, 0, 0, 0.5));
  }
  .clover.hover {
    z-index: 100;
    transform: translate(-50%, -50%) scale(1.6) !important;
  }
  .clover.hover svg {
    filter: drop-shadow(0 0 1px #FFFCF2) drop-shadow(0 0 2px #FFFCF2) drop-shadow(0 2px 6px rgba(0,0,0,0.6));
  }
  .clover.hover .leaflet-stroke {
    stroke: #FFFCF2 !important;
    stroke-width: 1.5 !important;
  }
  /* Hide unused field-sharp/dim — keep magnifier visible */
  .field-sharp, .dim-overlay, .field-blurry { display: none; }
  .field { display: block !important; }

  /* Magnifier — visual only (no zoom). Highlights clover under center. */
  .magnifier {
    position: absolute;
    width: 140px;
    height: 140px;
    pointer-events: none;
    z-index: 50;
    transform: translate(-50%, -50%);
    filter: drop-shadow(0 6px 20px rgba(0, 0, 0, 0.3));
    transition: opacity .25s;
    opacity: 0;
  }
  .magnifier.active { opacity: 1; }
  .magnifier .lens {
    width: 100%; height: 100%;
    border-radius: 50%;
    border: 4px solid rgba(255, 252, 242, 0.95);
    background: transparent;
    box-shadow:
      inset 0 0 0 1.5px rgba(255, 252, 242, 0.4),
      0 4px 16px rgba(0, 0, 0, 0.2);
    position: relative;
  }
  .magnifier .lens::after {
    content: '';
    position: absolute;
    top: 12px; left: 20px;
    width: 32px; height: 18px;
    background: radial-gradient(ellipse, rgba(255, 255, 255, 0.4), transparent 70%);
    border-radius: 50%;
    transform: rotate(-25deg);
    pointer-events: none;
  }
  .magnifier .handle {
    position: absolute;
    bottom: -18px; right: -8px;
    width: 50px; height: 16px;
    background: linear-gradient(135deg, #C4A572, #8B6F3F);
    border-radius: 10px;
    transform: rotate(40deg);
    transform-origin: top left;
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.3),
      0 4px 8px rgba(0, 0, 0, 0.25);
  }
  /* Centered crosshair dot at lens center */
  .magnifier::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255, 252, 242, 0.95);
    box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.3);
    transform: translate(-50%, -50%);
    z-index: 1;
  }

  .game-hint {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255, 252, 242, 0.92);
    color: var(--leaf-deep);
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    z-index: 20;
    display: flex; align-items: center; gap: 8px;
    pointer-events: none;
    transition: opacity .3s;
  }
  .game-hint .pulse {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--moss);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }

  /* ============================================================
     RESULT MODAL (sheet)
  ============================================================ */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(15, 22, 12, 0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 50;
    display: flex;
    align-items: flex-end;
    animation: fadein .3s;
  }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }

  .sheet {
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
    background: var(--ivory);
    border-radius: 28px 28px 0 0;
    padding: 0 24px 28px;
    box-shadow: 0 -8px 32px rgba(0,0,0,0.18);
    animation: slideUp .45s cubic-bezier(.2,.9,.3,1.05);
    position: relative;
  }
  @keyframes slideUp {
    from { transform: translateY(50px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .sheet .handle {
    width: 36px; height: 4px;
    background: rgba(155,142,124,0.3);
    border-radius: 2px;
    margin: 12px auto 22px;
  }

  .result-hero {
    text-align: center;
    margin-top: -90px;
    margin-bottom: 22px;
    position: relative;
  }
  .result-hero .clover-card {
    display: inline-block;
    background:
      radial-gradient(circle at 50% 50%, rgba(229, 199, 107, 0.3), transparent 60%),
      var(--ivory);
    border: 2px solid var(--gold-soft);
    border-radius: 28px;
    padding: 22px;
    box-shadow:
      0 12px 32px rgba(74, 107, 63, 0.18),
      inset 0 0 0 6px rgba(255, 252, 242, 0.5);
    position: relative;
  }
  .result-hero .clover-card::before {
    content: '';
    position: absolute;
    inset: -10px;
    border-radius: 36px;
    border: 1px solid rgba(229, 199, 107, 0.4);
  }
  .result-hero .stamp {
    position: absolute;
    top: -8px; right: -8px;
    background: var(--gold);
    color: white;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 5px 10px;
    border-radius: 10px;
    transform: rotate(8deg);
    box-shadow: 0 2px 8px rgba(212, 175, 55, 0.4);
  }
  .result-hero .stamp.fail {
    background: var(--greige);
  }

  .result-headline {
    text-align: center;
    margin-bottom: 22px;
  }
  .result-headline .eyebrow {
    font-size: 12px;
    color: var(--moss);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 10px;
  }
  .result-headline h2 {
    font-size: 23px;
    font-weight: 700;
    margin: 0 0 8px;
    letter-spacing: -0.02em;
  }
  .result-headline h2 .num {
    color: var(--moss);
    font-weight: 800;
  }
  .result-headline p {
    font-size: 14px;
    color: var(--ink-soft);
    margin: 0;
    line-height: 1.6;
  }

  .info-row {
    display: flex;
    gap: 8px;
    margin-bottom: 22px;
  }
  .info {
    flex: 1;
    background: var(--paper);
    border-radius: 14px;
    padding: 12px 10px;
    text-align: center;
  }
  .info .v { font-size: 16px; font-weight: 700; color: var(--leaf-deep); }
  .info .l { font-size: 11px; color: var(--ink-soft); margin-top: 2px; }

  .rewards {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 14px;
  }
  .btn-reward {
    width: 100%;
    border: none;
    border-radius: 18px;
    padding: 16px 22px;
    font-size: 15px;
    font-weight: 600;
    text-align: left;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    transition: transform .12s;
  }
  .btn-reward:active { transform: scale(0.99); }

  .btn-primary {
    background: linear-gradient(135deg, var(--moss), var(--leaf-deep));
    color: white;
    box-shadow: 0 4px 16px rgba(74, 107, 63, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.2);
  }
  .btn-primary .label { display: flex; flex-direction: column; gap: 2px; }
  .btn-primary .main { font-size: 15px; font-weight: 700; }
  .btn-primary .sub { font-size: 11px; opacity: 0.85; font-weight: 400; }
  .btn-primary .amount { font-size: 22px; font-weight: 800; }
  .btn-primary .amount .x5 {
    display: inline-block;
    background: var(--gold);
    color: var(--leaf-deep);
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 6px;
    margin-left: 4px;
    vertical-align: middle;
  }

  .btn-secondary {
    background: var(--paper);
    color: var(--ink-soft);
    border: 1px solid rgba(155,142,124,0.2);
  }
  .btn-secondary .main { font-size: 14px; font-weight: 500; }
  .btn-secondary .amount { font-size: 15px; font-weight: 600; }

  .footer-note {
    text-align: center;
    font-size: 11px;
    color: var(--greige);
  }
  .footer-note .lucky { color: var(--moss); font-weight: 500; }

  /* sparkles */
  .sparkle {
    position: absolute;
    pointer-events: none;
    font-size: 14px;
    opacity: 0.6;
    animation: sparkle 4s ease-in-out infinite;
  }
  @keyframes sparkle {
    0%, 100% { opacity: 0; transform: scale(0.6) rotate(0); }
    50% { opacity: 1; transform: scale(1) rotate(20deg); }
  }

  /* ============================================================
     AD MODAL (simulated)
  ============================================================ */
  .ad-modal {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
    animation: fadein .25s;
  }
  .ad-modal .label {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .ad-modal .title {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 12px;
  }
  .ad-modal .desc {
    font-size: 14px;
    color: rgba(255,255,255,0.7);
    margin-bottom: 36px;
  }
  .ad-progress {
    width: 220px; height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    overflow: hidden;
  }
  .ad-progress .bar {
    height: 100%;
    background: var(--gold);
    width: 0;
    animation: ad-fill 2s linear forwards;
  }
  @keyframes ad-fill { to { width: 100%; } }
  .ad-modal .countdown {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    margin-top: 16px;
  }

  /* ============================================================
     QUIT CONFIRM
  ============================================================ */
  .confirm-bg {
    position: fixed;
    inset: 0;
    background: rgba(15, 22, 12, 0.5);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadein .2s;
    padding: 24px;
  }
  .confirm {
    background: var(--ivory);
    border-radius: 22px;
    padding: 24px;
    width: 100%;
    max-width: 320px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    text-align: center;
  }
  .confirm h3 {
    font-size: 18px;
    font-weight: 700;
    margin: 0 0 8px;
  }
  .confirm p {
    font-size: 13px;
    color: var(--ink-soft);
    margin: 0 0 20px;
    line-height: 1.5;
  }
  .confirm-actions {
    display: flex;
    gap: 8px;
  }
  .confirm-actions button {
    flex: 1;
    border: none;
    border-radius: 12px;
    padding: 12px;
    font-size: 14px;
    font-weight: 600;
  }
  .confirm-actions .keep {
    background: rgba(155,142,124,0.15);
    color: var(--ink-soft);
  }
  .confirm-actions .yes {
    background: var(--leaf-deep);
    color: white;
  }

  /* ============================================================
     COLLECTION
  ============================================================ */
  .collection-bg {
    position: fixed;
    inset: 0;
    background: rgba(15, 22, 12, 0.55);
    backdrop-filter: blur(8px);
    z-index: 60;
    display: flex;
    align-items: flex-end;
  }
  .collection {
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
    background: var(--ivory);
    border-radius: 28px 28px 0 0;
    padding: 0 22px 28px;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 -8px 32px rgba(0,0,0,0.18);
    animation: slideUp .4s cubic-bezier(.2,.9,.3,1.05);
  }
  .collection .handle {
    width: 36px; height: 4px;
    background: rgba(155,142,124,0.3);
    border-radius: 2px;
    margin: 12px auto 16px;
  }
  .collection h2 {
    font-size: 20px;
    font-weight: 700;
    margin: 0 0 4px;
    text-align: center;
  }
  .collection .sub {
    text-align: center;
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 18px;
  }
  .collection-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .col-item {
    aspect-ratio: 1;
    background: var(--paper);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--ink-soft);
    text-align: center;
    line-height: 1.3;
  }
  .col-item.found {
    background: linear-gradient(135deg, rgba(212,175,55,0.15), rgba(143,188,143,0.1));
    border: 1px solid rgba(212,175,55,0.3);
    color: var(--leaf-deep);
    font-weight: 600;
  }
  .col-empty {
    text-align: center;
    color: var(--greige);
    font-size: 13px;
    padding: 40px 0;
  }
  .col-close {
    margin-top: 18px;
    width: 100%;
    background: rgba(155,142,124,0.15);
    color: var(--ink-soft);
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 14px;
    font-weight: 600;
  }

  /* ============================================================
     TOAST
  ============================================================ */
  .toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(45, 58, 38, 0.95);
    color: white;
    padding: 12px 20px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    z-index: 150;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    animation: toast-in .3s, toast-out .3s 1.7s forwards;
  }
  @keyframes toast-in {
    from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  @keyframes toast-out {
    to { opacity: 0; transform: translateX(-50%) translateY(-10px); }
  }
</style>
</head>
<body>

<!-- Global SVG defs: radial gradients per leaflet color (3D feel) -->
<svg width="0" height="0" style="position:absolute;" aria-hidden="true">
  <defs>
    <!-- Natural grass greens — softer gradients (less contrast, no neon) -->
    <radialGradient id="leafG-5C8B3F" cx="0.35" cy="0.35" r="0.9">
      <stop offset="0%" stop-color="#82AE60"/>
      <stop offset="60%" stop-color="#5C8B3F"/>
      <stop offset="100%" stop-color="#3E6628"/>
    </radialGradient>
    <radialGradient id="leafG-6B9C45" cx="0.35" cy="0.35" r="0.9">
      <stop offset="0%" stop-color="#92BE6E"/>
      <stop offset="60%" stop-color="#6B9C45"/>
      <stop offset="100%" stop-color="#4A7430"/>
    </radialGradient>
    <radialGradient id="leafG-78AD55" cx="0.35" cy="0.35" r="0.9">
      <stop offset="0%" stop-color="#9DCB7A"/>
      <stop offset="60%" stop-color="#78AD55"/>
      <stop offset="100%" stop-color="#54823C"/>
    </radialGradient>
    <radialGradient id="leafG-507A35" cx="0.35" cy="0.35" r="0.9">
      <stop offset="0%" stop-color="#759E58"/>
      <stop offset="60%" stop-color="#507A35"/>
      <stop offset="100%" stop-color="#345220"/>
    </radialGradient>
    <radialGradient id="leafG-86B85E" cx="0.35" cy="0.35" r="0.9">
      <stop offset="0%" stop-color="#A4D08A"/>
      <stop offset="60%" stop-color="#86B85E"/>
      <stop offset="100%" stop-color="#5E8C3C"/>
    </radialGradient>
    <radialGradient id="leafG-456B2C" cx="0.35" cy="0.35" r="0.9">
      <stop offset="0%" stop-color="#6B8F4D"/>
      <stop offset="60%" stop-color="#456B2C"/>
      <stop offset="100%" stop-color="#2D481A"/>
    </radialGradient>
  </defs>
</svg>

<div id="app"></div>

<script>
/* ============================================================
   STATE
============================================================ */
const STORAGE = 'clover_state_v1';
const TODAY = (() => {
  const d = new Date();
  // KST midnight
  d.setHours(0, 0, 0, 0);
  return d.toISOString().slice(0, 10);
})();

const defaultState = {
  ticket: 3,
  ticketDate: TODAY,
  totalFound: 0,
  bestTime: null,
  streak: 0,
  streakLastDate: null,
  collection: [], // [{date, time}]
  totalRewardCents: 0, // accumulated reward in 원
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE);
    if (!raw) return { ...defaultState };
    const s = JSON.parse(raw);
    // Daily reset of tickets if new day
    if (s.ticketDate !== TODAY) {
      s.ticket = 3;
      s.ticketDate = TODAY;
    }
    return { ...defaultState, ...s };
  } catch (e) {
    return { ...defaultState };
  }
}
function saveState(s) {
  localStorage.setItem(STORAGE, JSON.stringify(s));
}

let persistedState = loadState();

let view = {
  phase: 'home',           // 'home' | 'playing' | 'result' | 'failed'
  showCollection: false,
  showQuitConfirm: false,
  // Game runtime
  timeLeft: 30,
  timerId: null,
  startedAt: 0,
  foundAt: null,           // seconds elapsed when found
  extendedTime: false,
  cloverPositions: [],
  magnifier: { x: 50, y: 50, active: false },
  // Modals
  adActive: null,          // 'ticket' | 'extend' | 'reward5x' | null
  adCallback: null,
};

/* ============================================================
   RENDER
============================================================ */
const $app = document.getElementById('app');

function render() {
  $app.innerHTML = renderRoot();
  attachHandlers();
}

function renderRoot() {
  let main = '';
  if (view.phase === 'home') main = renderHome();
  else if (view.phase === 'playing') main = renderGame();
  else if (view.phase === 'result' || view.phase === 'failed') main = renderGame() + renderResultSheet();

  return main
    + (view.showCollection ? renderCollection() : '')
    + (view.showQuitConfirm ? renderQuitConfirm() : '')
    + (view.adActive ? renderAdModal() : '')
    + (view.toast ? `<div class="toast">${escapeHtml(view.toast)}</div>` : '');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ============================================================
   HOME
============================================================ */
function renderHome() {
  const s = persistedState;
  return `
  <div class="home">
    <header class="home-header">
      <div class="brand">🍀 오늘의 행운</div>
      <button class="icon-btn" data-action="open-collection" aria-label="도감">📔</button>
    </header>

    <div class="hero">
      <div class="eyebrow">${formatDate()}</div>
      <h1>오늘의 행운을<br/>찾아보세요</h1>
      <p>풀숲 어딘가에 숨어있는 네잎클로버.<br/>30초의 잔잔한 몰입을 시작해요.</p>
    </div>

    <div class="illust">
      <div class="glow"></div>
      <svg viewBox="0 0 200 200">
        <g transform="translate(100,100)">
          <path d="M 0 30 Q -3 60 5 90" fill="none" stroke="#4A6B3F" stroke-width="3" stroke-linecap="round"/>
          <ellipse class="leaf-anim leaf-1" cx="0" cy="-30" rx="22" ry="28" fill="#6B8E5A"/>
          <ellipse class="leaf-anim leaf-2" cx="-30" cy="0" rx="28" ry="22" fill="#7A9C68"/>
          <ellipse class="leaf-anim leaf-3" cx="30" cy="0" rx="28" ry="22" fill="#7A9C68"/>
          <ellipse class="leaf-anim leaf-4" cx="0" cy="30" rx="22" ry="28" fill="#5C7D4D"/>
          <ellipse cx="-3" cy="-35" rx="6" ry="8" fill="#A8C99A" opacity="0.5"/>
          <ellipse cx="-33" cy="-3" rx="8" ry="6" fill="#A8C99A" opacity="0.5"/>
          <circle cx="0" cy="0" r="6" fill="#D4AF37" opacity="0.7"/>
          <circle cx="0" cy="0" r="3" fill="#FFFCF2"/>
        </g>
      </svg>
    </div>

    <div class="ticket-card">
      <div>
        <div class="label">오늘의 도전권</div>
        <div class="count">${s.ticket} <span class="total">/ 3</span></div>
      </div>
      <div class="dots">
        ${[0,1,2].map(i => `<span class="dot ${i < s.ticket ? '' : 'spent'}"></span>`).join('')}
      </div>
    </div>

    <div class="cta-wrap">
      ${s.ticket > 0
        ? `<button class="cta" data-action="start-game"><span>🎯</span><span>행운 찾기 시작</span></button>`
        : `<button class="cta gold" data-action="ad-ticket"><span>📺</span><span>광고 보고 도전권 +1</span></button>`
      }
    </div>

    <div class="stats">
      <div class="stat"><div class="v">${s.totalFound}</div><div class="l">총 발견</div></div>
      <div class="stat"><div class="v">${s.streak}일</div><div class="l">연속 발견</div></div>
      <div class="stat"><div class="v">${s.bestTime ? s.bestTime + '초' : '-'}</div><div class="l">최고 기록</div></div>
    </div>

    <div class="home-hint">
      ${s.ticket === 0
        ? '광고를 보면 도전권을 1장 더 받을 수 있어요'
        : '매일 자정에 도전권 3장이 새로 충전돼요'}
    </div>
  </div>`;
}

function formatDate() {
  const d = new Date();
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getFullYear()} · ${d.getMonth() + 1} · ${d.getDate()} ${days[d.getDay()]}요일`;
}

/* ============================================================
   GAME
============================================================ */
function renderGame() {
  const time = view.timeLeft;
  const m = Math.floor(time / 60), sec = time % 60;
  const timeStr = `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  const warn = time <= 10;

  return `
  <div class="game" id="game-area">
    <div class="game-hud">
      <div class="timer-pill ${warn ? 'warn' : ''}">
        <div class="ring"></div>
        <div class="time">${timeStr}</div>
      </div>
      <button class="quit-btn" data-action="confirm-quit">포기하기</button>
    </div>

    <div class="grass-bg">${renderGrass(view.grassBg || [])}</div>

    <div class="field" id="field" style="display:block; position:absolute; inset:0;">
      ${renderField()}
    </div>

    <div class="grass-fg">${renderGrass(view.grassFg || [])}</div>

    <div class="magnifier" id="mag" style="left:50%; top:52%;">
      <div class="lens"></div>
      <div class="handle"></div>
    </div>

    ${view.phase === 'playing' ? `
      <div class="game-hint">
        <span class="pulse"></span>
        <span>돋보기를 움직이며 네잎클로버를 찾아보세요</span>
      </div>
    ` : ''}
  </div>`;
}

function renderField() {
  return view.cloverPositions.map((c, i) => {
    const svg = c.isLucky ? fourLeafSvg(c.scale, c.rot) : threeLeafSvg(c.c1, c.c2, c.scale, c.rot);
    return `<div class="clover" data-i="${i}" data-lucky="${c.isLucky ? 1 : 0}" style="left:${c.x}%; top:${c.y}%; transform:translate(-50%,-50%);${!c.isLucky ? `opacity:${c.opacity};` : ''}">
      ${svg}
    </div>`;
  }).join('');
}

function renderGrass(blades) {
  return blades.map(b => `<div class="grass-blade" style="left:${b.x}%;top:${b.y}%;transform:translate(-50%,-100%) rotate(${b.tilt}deg);">${b.svg}</div>`).join('');
}

function makeGrassBlade(h, w, color, opacity) {
  return `<svg width="${w * 2}" height="${h}" viewBox="0 0 ${w * 2} ${h}">
    <path d="M ${w} ${h} Q ${w + w * 0.3} ${h * 0.5} ${w} 0 L ${w + 0.4} 0 Q ${w + w * 0.4} ${h * 0.5} ${w + 0.4} ${h} Z"
          fill="${color}" opacity="${opacity}"/>
  </svg>`;
}

function renderDecorations() {
  // Pre-generated decorations stored in view.decorations
  if (!view.decorations) return '';
  return view.decorations.map(d => `<div class="clover" style="left:${d.x}%; top:${d.y}%; transform:translate(-50%,-50%); pointer-events:none;">${d.svg}</div>`).join('');
}

// V1 path (둥근 하트)
const LEAFLET_PATH = "M 0 -2 C -3 -3 -8 -5 -10 -9 C -12 -13 -10 -17 -6 -17 C -3 -17 -1 -15 0 -12 C 1 -15 3 -17 6 -17 C 10 -17 12 -13 10 -9 C 8 -5 3 -3 0 -2 Z";

function lighter(c) {
  const map = {
    '#5C8B3F': '#82AE60', '#6B9C45': '#92BE6E', '#78AD55': '#9DCB7A',
    '#507A35': '#759E58', '#86B85E': '#A4D08A', '#456B2C': '#6B8F4D',
  };
  return map[c] || '#9DCB7A';
}

// Leaflet with 3D gradient + V-mark + transparent stroke (turns white on hover)
function leafletWithMark(c) {
  const gradId = 'leafG-' + c.slice(1);
  return `<path class="leaflet-stroke" d="${LEAFLET_PATH}" fill="url(#${gradId})" stroke="transparent" stroke-width="0"/>
    <path d="M -4.5 -10 Q 0 -8 4.5 -10" stroke="${lighter(c)}" stroke-width="0.9" fill="none" opacity="0.65" stroke-linecap="round"/>`;
}

// 3-leaf trefoil + visible stem (longer, brighter)
function threeLeafSvg(c1, c2, scale, rot) {
  const size = Math.round(42 * scale);
  return `<svg width="${size}" height="${size}" viewBox="0 0 42 42" style="transform:rotate(${rot}deg);">
    <g transform="translate(21,20)">
      <!-- Visible curved stem extending below -->
      <path d="M 0 0 Q 2 9 -1 20" fill="none" stroke="#5A8042" stroke-width="1.8" stroke-linecap="round" opacity="0.95"/>
      <path d="M 0 0 Q 2 9 -1 20" fill="none" stroke="#7DAA5A" stroke-width="0.7" stroke-linecap="round" opacity="0.6"/>
      <g transform="rotate(0)">${leafletWithMark(c1)}</g>
      <g transform="rotate(120)">${leafletWithMark(c2)}</g>
      <g transform="rotate(-120)">${leafletWithMark(c1)}</g>
    </g>
  </svg>`;
}

// 4-leaf with stem
function fourLeafSvg(scale, rot) {
  const size = Math.round(44 * scale);
  return `<svg width="${size}" height="${size}" viewBox="0 0 44 44" style="transform:rotate(${rot}deg);">
    <g transform="translate(22,21)">
      <path d="M 0 0 Q 2 10 -1 22" fill="none" stroke="#5A8042" stroke-width="1.9" stroke-linecap="round" opacity="0.95"/>
      <path d="M 0 0 Q 2 10 -1 22" fill="none" stroke="#7DAA5A" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
      <g transform="rotate(0)">${leafletWithMark('#8FCB68')}</g>
      <g transform="rotate(90)">${leafletWithMark('#A2D870')}</g>
      <g transform="rotate(180)">${leafletWithMark('#74B655')}</g>
      <g transform="rotate(-90)">${leafletWithMark('#A2D870')}</g>
    </g>
  </svg>`;
}

/* ============================================================
   RESULT SHEET
============================================================ */
function renderResultSheet() {
  const won = view.phase === 'result';
  const seconds = view.foundAt;
  const baseReward = won ? rewardForTime(seconds, view.extendedTime) : 1;
  const adReward = baseReward * 5;
  const s = persistedState;

  const sparkles = won ? `
    <div class="sparkle" style="top:18%;left:18%;">✦</div>
    <div class="sparkle" style="top:12%;right:22%;animation-delay:-1.2s;">✧</div>
    <div class="sparkle" style="top:30%;left:12%;animation-delay:-2.4s;">✦</div>
    <div class="sparkle" style="top:25%;right:14%;animation-delay:-3.6s;">✧</div>
  ` : '';

  return `
  <div class="modal-bg">
    ${sparkles}
    <div class="sheet">
      <div class="handle"></div>

      <div class="result-hero">
        <div class="clover-card">
          <div class="stamp ${won ? '' : 'fail'}">${won ? 'FOUND' : 'MISS'}</div>
          <svg width="120" height="120" viewBox="0 0 120 120">
            <g transform="translate(60,60)">
              <ellipse cx="0" cy="-22" rx="16" ry="22" fill="${won ? '#6B8E5A' : '#9C8E7C'}"/>
              <ellipse cx="-22" cy="0" rx="22" ry="16" fill="${won ? '#7A9C68' : '#A8A095'}"/>
              <ellipse cx="22" cy="0" rx="22" ry="16" fill="${won ? '#7A9C68' : '#A8A095'}"/>
              ${won ? '<ellipse cx="0" cy="22" rx="16" ry="22" fill="#5C7D4D"/>' : ''}
              <line x1="0" y1="22" x2="0" y2="42" stroke="#3A5530" stroke-width="2.5" stroke-linecap="round"/>
              <circle cx="0" cy="0" r="6" fill="${won ? '#D4AF37' : '#9C8E7C'}" opacity="0.7"/>
              <circle cx="0" cy="0" r="3" fill="#FFFCF2"/>
            </g>
          </svg>
        </div>
      </div>

      <div class="result-headline">
        <div class="eyebrow">${formatDate()}</div>
        <h2>${won
          ? `<span class="num">${seconds}초</span>만에 발견했어요`
          : '아직 행운이 숨어있어요'}</h2>
        <p>${won
          ? '오늘 좋은 일이 생길 거예요 🍀'
          : '광고를 보면 30초 더 시도할 수 있어요'}</p>
      </div>

      <div class="info-row">
        <div class="info"><div class="v">${s.totalFound}${won ? '+1' : ''}</div><div class="l">총 발견</div></div>
        <div class="info"><div class="v">${s.streak}일</div><div class="l">연속 발견</div></div>
        <div class="info"><div class="v">${s.bestTime ? s.bestTime + '초' : '-'}</div><div class="l">최고 기록</div></div>
      </div>

      <div class="rewards">
        ${won ? `
          <button class="btn-reward btn-primary" data-action="reward-ad">
            <div class="label">
              <div class="main">📺 광고 보고 5배 받기</div>
              <div class="sub">짧은 광고 영상을 시청해요</div>
            </div>
            <div class="amount">${adReward}원<span class="x5">x5</span></div>
          </button>
          <button class="btn-reward btn-secondary" data-action="reward-skip">
            <div class="label"><div class="main">그냥 받기</div></div>
            <div class="amount">${baseReward}원</div>
          </button>
        ` : `
          ${!view.extendedTime ? `
          <button class="btn-reward btn-primary" data-action="extend-ad">
            <div class="label">
              <div class="main">📺 광고 보고 30초 더</div>
              <div class="sub">한 번 더 시도해요</div>
            </div>
            <div class="amount">+30s</div>
          </button>
          ` : ''}
          <button class="btn-reward btn-secondary" data-action="reward-skip">
            <div class="label"><div class="main">포기하기</div></div>
            <div class="amount">1원</div>
          </button>
        `}
      </div>

      <div class="footer-note">
        <span class="lucky">🍀</span> 발견한 네잎클로버는 도감에 자동으로 기록돼요
      </div>
    </div>
  </div>`;
}

function rewardForTime(s, extended) {
  if (extended) return 1;  // post-extension always 1원 base
  if (s <= 10) return 5;
  if (s <= 20) return 3;
  return 2;
}

/* ============================================================
   COLLECTION
============================================================ */
function renderCollection() {
  const items = persistedState.collection.slice(-12).reverse();
  return `
  <div class="collection-bg" data-action="close-collection">
    <div class="collection" onclick="event.stopPropagation()">
      <div class="handle"></div>
      <h2>📔 행운 도감</h2>
      <div class="sub">
        총 ${persistedState.totalFound}개 발견 ·
        누적 보상 ${persistedState.totalRewardCents}원 ·
        최고 ${persistedState.bestTime ? persistedState.bestTime + '초' : '-'}
      </div>
      ${items.length === 0
        ? `<div class="col-empty">🌱<br/>아직 발견한 네잎클로버이 없어요<br/>오늘의 행운을 찾아보세요</div>`
        : `<div class="collection-grid">${items.map(it => `
            <div class="col-item found">
              <div>
                <div style="font-size:18px;">🍀</div>
                <div>${it.date.slice(5)}</div>
                <div style="opacity:0.6;font-size:10px;">${it.time}초</div>
              </div>
            </div>`).join('')}</div>`
      }
      <button class="col-close" data-action="close-collection">닫기</button>
    </div>
  </div>`;
}

/* ============================================================
   QUIT CONFIRM
============================================================ */
function renderQuitConfirm() {
  return `
  <div class="confirm-bg" data-action="cancel-quit">
    <div class="confirm" onclick="event.stopPropagation()">
      <h3>포기할까요?</h3>
      <p>지금 포기하면 도전권 1장이<br/>그대로 차감돼요.</p>
      <div class="confirm-actions">
        <button class="keep" data-action="cancel-quit">계속하기</button>
        <button class="yes" data-action="quit-game">포기</button>
      </div>
    </div>
  </div>`;
}

/* ============================================================
   AD MODAL
============================================================ */
function renderAdModal() {
  const titles = {
    ticket: '도전권 충전 중',
    extend: '시간 추가 중',
    reward5x: '5배 보상 광고',
  };
  const descs = {
    ticket: '광고 시청 후 도전권 1장이 지급돼요',
    extend: '광고 시청 후 30초가 추가돼요',
    reward5x: '광고 시청 후 5배 보상이 지급돼요',
  };
  return `
  <div class="ad-modal">
    <div class="label">SAMPLE AD</div>
    <div class="title">${titles[view.adActive] || '광고 시청 중'}</div>
    <div class="desc">${descs[view.adActive] || ''}</div>
    <div class="ad-progress"><div class="bar"></div></div>
    <div class="countdown">2초 후 자동 종료</div>
  </div>`;
}

/* ============================================================
   GAME LOGIC
============================================================ */
function startGame() {
  if (persistedState.ticket <= 0) return;
  persistedState.ticket -= 1;
  saveState(persistedState);

  // Generate clover field: dense grid placement (natural grass greens)
  const palette = ['#5C8B3F', '#6B9C45', '#78AD55', '#507A35', '#86B85E', '#456B2C'];
  const COLS = 14;
  const ROWS = 22;
  const cellW = 100 / COLS;
  const cellH = 100 / ROWS;
  const positions = [];

  // Pick a random cell for the lucky 4-leaf
  const luckyCol = 1 + Math.floor(Math.random() * (COLS - 2));
  const luckyRow = 1 + Math.floor(Math.random() * (ROWS - 2));

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cx = (c + 0.5) * cellW + (Math.random() - 0.5) * cellW * 0.6;
      const cy = (r + 0.5) * cellH + (Math.random() - 0.5) * cellH * 0.6;
      const isLucky = (c === luckyCol && r === luckyRow);
      if (isLucky) {
        positions.push({
          x: cx, y: cy, isLucky: true,
          scale: 0.6 + Math.random() * 0.1,
          rot: Math.random() * 30 - 15,
        });
      } else {
        positions.push({
          x: cx, y: cy, isLucky: false,
          scale: 0.55 + Math.random() * 0.15,
          rot: Math.random() * 360 - 180,
          c1: palette[Math.floor(Math.random() * palette.length)],
          c2: palette[Math.floor(Math.random() * palette.length)],
          opacity: 0.92 + Math.random() * 0.08,
        });
      }
    }
  }
  view.cloverPositions = positions;
  view.decorations = [];

  // F6 grass: spring tones (bright + golden) — bg layer + fg layer
  const bgGrassColors = ['#5A8042', '#6B9450', '#7DAA5A', '#88B964', '#4A6B3F', '#A8DC85'];
  const fgGrassColors = ['#88B964', '#A8DC85', '#5A8042', '#7DAA5A', '#C5DEA8', '#6B9450'];

  // Background: 200 short blades scattered behind clovers
  const grassBg = [];
  for (let i = 0; i < 200; i++) {
    const h = 10 + Math.random() * 14;
    const w = 1 + Math.random() * 0.6;
    const color = bgGrassColors[Math.floor(Math.random() * bgGrassColors.length)];
    grassBg.push({
      x: Math.random() * 100,
      y: Math.random() * 100,
      tilt: Math.random() * 50 - 25,
      svg: makeGrassBlade(h, w, color, 0.5 + Math.random() * 0.3),
    });
  }
  view.grassBg = grassBg;

  // Foreground: 60 tall blades over clovers (can overlap)
  const grassFg = [];
  for (let i = 0; i < 60; i++) {
    const h = 22 + Math.random() * 22;
    const w = 1.2 + Math.random() * 0.8;
    const color = fgGrassColors[Math.floor(Math.random() * fgGrassColors.length)];
    grassFg.push({
      x: Math.random() * 100,
      y: 5 + Math.random() * 95,
      tilt: Math.random() * 50 - 25,
      svg: makeGrassBlade(h, w, color, 0.55 + Math.random() * 0.3),
    });
  }
  view.grassFg = grassFg;

  // State
  view.phase = 'playing';
  view.timeLeft = 30;
  view.startedAt = Date.now();
  view.foundAt = null;
  view.extendedTime = false;
  view.hoveredIdx = -1;

  startTimer();
  render();
}

function startTimer() {
  if (view.timerId) clearInterval(view.timerId);
  view.timerId = setInterval(() => {
    if (view.phase !== 'playing') return;
    view.timeLeft -= 1;
    if (view.timeLeft <= 0) {
      view.timeLeft = 0;
      timeUp();
    } else {
      // Only update timer DOM, not full re-render (for perf)
      const $time = document.querySelector('.timer-pill .time');
      const $pill = document.querySelector('.timer-pill');
      if ($time) {
        const m = Math.floor(view.timeLeft / 60), s = view.timeLeft % 60;
        $time.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        if (view.timeLeft <= 10) $pill.classList.add('warn');
      }
    }
  }, 1000);
}

function timeUp() {
  if (view.timerId) clearInterval(view.timerId);
  view.timerId = null;
  view.phase = 'failed';
  render();
}

function found() {
  if (view.phase !== 'playing') return;
  if (view.timerId) clearInterval(view.timerId);
  view.timerId = null;
  const elapsed = Math.max(1, Math.round((Date.now() - view.startedAt) / 1000));
  view.foundAt = elapsed;
  view.phase = 'result';
  render();
}

function claimReward(useAd) {
  const won = view.phase === 'result';
  let reward = 1;
  if (won) {
    reward = rewardForTime(view.foundAt, view.extendedTime);
    if (useAd) reward *= 5;
  } else {
    reward = 1; // 포기하기
  }

  // Update persisted state
  persistedState.totalRewardCents += reward;

  if (won) {
    persistedState.totalFound += 1;
    if (persistedState.bestTime === null || view.foundAt < persistedState.bestTime) {
      persistedState.bestTime = view.foundAt;
    }
    // streak
    const yesterday = (() => {
      const d = new Date();
      d.setDate(d.getDate() - 1);
      d.setHours(0,0,0,0);
      return d.toISOString().slice(0, 10);
    })();
    if (persistedState.streakLastDate === yesterday || persistedState.streakLastDate === TODAY) {
      if (persistedState.streakLastDate !== TODAY) persistedState.streak += 1;
    } else {
      persistedState.streak = 1;
    }
    persistedState.streakLastDate = TODAY;
    // Add to collection
    persistedState.collection.push({ date: TODAY, time: view.foundAt });
  }
  saveState(persistedState);

  // Reset and go home
  view.phase = 'home';
  view.toast = `${reward}원 지급 🍀`;
  setTimeout(() => { view.toast = null; if (view.phase === 'home') render(); }, 2000);
  render();
}

function extendTime() {
  if (view.phase !== 'failed') return;
  view.timeLeft = 30;
  view.phase = 'playing';
  view.extendedTime = true;
  view.startedAt = Date.now() - (view.extendedTime ? 0 : 0); // restart relative
  startTimer();
  render();
}

function showAd(context, callback) {
  // TEST MODE: skip ad, run callback immediately
  if (callback) callback();
}

/* ============================================================
   EVENT HANDLERS
============================================================ */
function attachHandlers() {
  // Action buttons
  $app.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', (e) => {
      const action = el.dataset.action;
      handleAction(action, e);
    });
  });

  // Hover-highlight interaction (reference style)
  if (view.phase === 'playing') {
    const $game = document.getElementById('game-area');
    if ($game) {
      const cloverEls = $game.querySelectorAll('.clover');

      function findNearest(px, py) {
        let bestIdx = -1, bestDist = Infinity;
        for (let i = 0; i < view.cloverPositions.length; i++) {
          const d = view.cloverPositions[i];
          const dx = d.x - px, dy = d.y - py;
          const dist = dx * dx + dy * dy;
          if (dist < bestDist) { bestDist = dist; bestIdx = i; }
        }
        return bestIdx;
      }

      function setHover(idx) {
        if (idx === view.hoveredIdx) return;
        if (view.hoveredIdx >= 0 && cloverEls[view.hoveredIdx]) {
          cloverEls[view.hoveredIdx].classList.remove('hover');
        }
        if (idx >= 0 && cloverEls[idx]) {
          cloverEls[idx].classList.add('hover');
        }
        view.hoveredIdx = idx;
      }

      const $mag = document.getElementById('mag');

      const updateFromEvent = (e) => {
        const rect = $game.getBoundingClientRect();
        const isTouch = e.touches && e.touches.length > 0;
        const cx = isTouch ? e.touches[0].clientX : e.clientX;
        const cy = isTouch ? e.touches[0].clientY : e.clientY;
        const px = ((cx - rect.left) / rect.width) * 100;
        const py = ((cy - rect.top) / rect.height) * 100;
        if (px < 0 || px > 100 || py < 0 || py > 100) {
          setHover(-1);
          if ($mag) $mag.classList.remove('active');
          return;
        }
        // Move magnifier to cursor position; magnifier center === highlight anchor
        if ($mag) {
          $mag.style.left = px + '%';
          $mag.style.top = py + '%';
          $mag.classList.add('active');
        }
        setHover(findNearest(px, py));
        const $hint = $game.querySelector('.game-hint');
        if ($hint) $hint.style.opacity = '0';
      };

      const tapHandler = (e) => {
        e.preventDefault();
        updateFromEvent(e);
        // Check if hovered clover is lucky
        if (view.hoveredIdx >= 0) {
          const c = view.cloverPositions[view.hoveredIdx];
          if (c.isLucky) found();
        }
      };

      $game.addEventListener('mousemove', updateFromEvent);
      $game.addEventListener('mouseleave', () => setHover(-1));
      $game.addEventListener('mousedown', tapHandler);
      $game.addEventListener('touchstart', tapHandler, { passive: false });
      $game.addEventListener('touchmove', (e) => { e.preventDefault(); updateFromEvent(e); }, { passive: false });
    }
  }
}

function handleAction(action, e) {
  switch (action) {
    case 'start-game':
      startGame();
      break;
    case 'ad-ticket':
      showAd('ticket', () => {
        persistedState.ticket = Math.min(5, persistedState.ticket + 1);
        saveState(persistedState);
        view.toast = '도전권 +1';
        setTimeout(() => { view.toast = null; render(); }, 1800);
        render();
      });
      break;
    case 'extend-ad':
      showAd('extend', () => {
        extendTime();
      });
      break;
    case 'reward-ad':
      showAd('reward5x', () => {
        claimReward(true);
      });
      break;
    case 'reward-skip':
      claimReward(false);
      break;
    case 'open-collection':
      view.showCollection = true;
      render();
      break;
    case 'close-collection':
      view.showCollection = false;
      render();
      break;
    case 'confirm-quit':
      view.showQuitConfirm = true;
      render();
      break;
    case 'cancel-quit':
      view.showQuitConfirm = false;
      render();
      break;
    case 'quit-game':
      view.showQuitConfirm = false;
      view.phase = 'failed';
      if (view.timerId) clearInterval(view.timerId);
      render();
      break;
  }
}

// First render
render();
</script>
