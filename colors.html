<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>🎨 클로버·배경 색 시안 10가지</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css" />
<style>
  :root {
    --moss: #6B8E5A;
    --leaf-deep: #4A6B3F;
    --paper: #F5F1E6;
    --ivory: #FFFCF2;
    --greige: #9C8E7C;
    --gold: #D4AF37;
    --ink: #2D3A26;
    --ink-soft: #5A6B4F;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 1080px;
    margin: 0 auto;
    padding: 32px 16px 80px;
  }
  header {
    text-align: center;
    margin-bottom: 28px;
  }
  header .eyebrow {
    font-size: 12px;
    color: var(--moss);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 10px;
  }
  header h1 {
    font-size: 24px;
    font-weight: 700;
    margin: 0 0 10px;
    letter-spacing: -0.02em;
  }
  header p {
    font-size: 13px;
    color: var(--ink-soft);
    margin: 0;
    line-height: 1.55;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }
  @media (min-width: 700px) {
    .grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (min-width: 1000px) {
    .grid { grid-template-columns: repeat(4, 1fr); }
  }

  .card {
    background: var(--ivory);
    border: 1px solid rgba(107, 142, 90, 0.15);
    border-radius: 16px;
    padding: 14px;
    box-shadow: 0 4px 16px rgba(74, 107, 63, 0.05);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .card .head {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .card .ver {
    font-size: 10px;
    color: var(--greige);
    letter-spacing: 0.12em;
    font-weight: 600;
  }
  .card .name {
    font-size: 13px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .card .desc {
    font-size: 10px;
    color: var(--ink-soft);
    line-height: 1.4;
  }
  .swatches {
    display: flex;
    gap: 4px;
    margin-top: 4px;
  }
  .swatch {
    width: 18px; height: 18px;
    border-radius: 4px;
    box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.1);
  }
  .preview {
    aspect-ratio: 3 / 4;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
  }
  .preview .clover-mini {
    position: absolute;
    transform-origin: center;
    pointer-events: none;
  }
  .preview .clover-mini svg {
    filter: drop-shadow(0 1px 1.5px rgba(0,0,0,0.4));
  }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute;" aria-hidden="true">
  <defs id="grad-defs"></defs>
</svg>

<div class="wrap">

<header>
  <div class="eyebrow">COLOR PALETTE VARIANTS</div>
  <h1>🎨 클로버 + 배경 색 시안 10가지</h1>
  <p>각 카드는 배경/클로버 색 조합과 빽빽한 미리보기를 보여줍니다.<br/>마음에 드는 번호 알려주시면 게임에 적용합니다.</p>
</header>

<div class="grid" id="grid"></div>

</div>

<script>
const LEAFLET_PATH = "M 0 -2 C -3 -3 -8 -5 -10 -9 C -12 -13 -10 -17 -6 -17 C -3 -17 -1 -15 0 -12 C 1 -15 3 -17 6 -17 C 10 -17 12 -13 10 -9 C 8 -5 3 -3 0 -2 Z";

// 10 color variants — each has bg gradient + clover palette + lighter shades
const variants = [
  {
    ver: 'C1', name: '봄 새싹 (현재)',
    desc: '밝은 봄 그린 + 라임 클로버. 신선하고 활기.',
    bg: 'radial-gradient(ellipse 50% 40% at 20% 20%, rgba(168, 220, 133, 0.5), transparent 60%), radial-gradient(ellipse 50% 40% at 80% 85%, rgba(125, 168, 90, 0.45), transparent 60%), radial-gradient(ellipse at 20% 20%, #88B964 0%, transparent 55%), linear-gradient(160deg, #7DAA5A 0%, #557E38 100%)',
    palette: ['#74B655', '#8FCB68', '#A2D870', '#9DD460'],
    light:   ['#A8DC85', '#BFE693', '#D4F0A0', '#C5EC92'],
  },
  {
    ver: 'C2', name: '자연 잔디',
    desc: '자연스러운 풀색. 너무 밝지도 어둡지도 않은 균형.',
    bg: 'radial-gradient(ellipse at 30% 20%, #7A9C68, transparent 55%), radial-gradient(ellipse at 80% 80%, #4A6B3F, transparent 55%), linear-gradient(135deg, #6B8E5A 0%, #4A6B3F 100%)',
    palette: ['#5C8B3F', '#6B9C45', '#78AD55', '#507A35'],
    light:   ['#82AE60', '#92BE6E', '#9DCB7A', '#759E58'],
  },
  {
    ver: 'C3', name: '여름 진초록',
    desc: '진한 여름 풀 + 깊은 녹색 클로버. 풍성한 느낌.',
    bg: 'radial-gradient(ellipse at 30% 20%, #5A8042, transparent 55%), radial-gradient(ellipse at 80% 80%, #2D4A1F, transparent 55%), linear-gradient(135deg, #4A6B3F 0%, #2D4A1F 100%)',
    palette: ['#3F6B28', '#507A35', '#5C8B3F', '#345220'],
    light:   ['#608C48', '#759E58', '#82AE60', '#5A7E42'],
  },
  {
    ver: 'C4', name: '이른 아침 안개',
    desc: '회녹색 안개 같은 부드러운 톤. 차분.',
    bg: 'radial-gradient(ellipse at 30% 30%, #BFD4A8, transparent 60%), radial-gradient(ellipse at 75% 80%, #8AA378, transparent 55%), linear-gradient(150deg, #A8C088 0%, #6E8C5C 100%)',
    palette: ['#6E8C5C', '#82A06E', '#92AE7A', '#5C7A4D'],
    light:   ['#9DBE85', '#B0CC97', '#BCD3A2', '#82A06E'],
  },
  {
    ver: 'C5', name: '황혼 + 황금톤',
    desc: '따뜻한 노을빛. 황금/오렌지 패치 + 따뜻한 클로버.',
    bg: 'radial-gradient(ellipse at 20% 20%, rgba(212, 175, 55, 0.25), transparent 55%), radial-gradient(ellipse at 80% 75%, #5E8042, transparent 55%), linear-gradient(160deg, #88AB60 0%, #5A7838 100%)',
    palette: ['#6B9038', '#7CA044', '#8DAE52', '#5E7E2F'],
    light:   ['#90B262', '#A0BF74', '#B0CB85', '#85A555'],
  },
  {
    ver: 'C6', name: '숲 그늘 차가움',
    desc: '시원한 청록색. 그늘진 숲 바닥 느낌.',
    bg: 'radial-gradient(ellipse at 30% 25%, #5A8068, transparent 55%), radial-gradient(ellipse at 80% 80%, #3A5A4A, transparent 55%), linear-gradient(160deg, #4D7058 0%, #2D4A38 100%)',
    palette: ['#4A7558', '#5A8866', '#6E9978', '#3A5C45'],
    light:   ['#75A082', '#85AE92', '#95BCA0', '#5C7E68'],
  },
  {
    ver: 'C7', name: '클래식 모스',
    desc: '가장 무난한 모스 그린. 토스 톤에 가까움.',
    bg: 'radial-gradient(ellipse at 30% 20%, #7A9C68, transparent 55%), radial-gradient(ellipse at 70% 75%, #4A6B3F, transparent 55%), linear-gradient(135deg, #6B8E5A 0%, #4A6B3F 100%)',
    palette: ['#6B8E5A', '#7A9C68', '#5C7D4D', '#4A6B3F'],
    light:   ['#8FBC8F', '#A8C99A', '#7A9C68', '#6B8E5A'],
  },
  {
    ver: 'C8', name: '늦여름 올리브',
    desc: '올리브 + 황록색. 따뜻하고 차분한 톤.',
    bg: 'radial-gradient(ellipse at 30% 25%, #8A9858, transparent 55%), radial-gradient(ellipse at 75% 80%, #5C6A38, transparent 55%), linear-gradient(160deg, #758248 0%, #4F5828 100%)',
    palette: ['#6F7C3A', '#7E8C44', '#8C9A52', '#5F6C2E'],
    light:   ['#929E5C', '#A1AC6E', '#AFBA80', '#828F50'],
  },
  {
    ver: 'C9', name: '이끼 다크',
    desc: '어두운 이끼색 배경. 미스테리어스, 신비로움.',
    bg: 'radial-gradient(ellipse at 30% 25%, #3F5530, transparent 55%), radial-gradient(ellipse at 80% 80%, #1F2D17, transparent 60%), linear-gradient(160deg, #2D4A1F 0%, #1A2410 100%)',
    palette: ['#5A7E40', '#6B9248', '#78A055', '#4A6B30'],
    light:   ['#80A560', '#92B470', '#A0C080', '#6E8E50'],
  },
  {
    ver: 'C10', name: '파스텔 수채화',
    desc: '파스텔 톤. 부드럽고 친근한 동화책 느낌.',
    bg: 'radial-gradient(ellipse at 25% 25%, #C0DCA0, transparent 60%), radial-gradient(ellipse at 80% 80%, #98B880, transparent 55%), linear-gradient(150deg, #B5D098 0%, #88A872 100%)',
    palette: ['#88A872', '#9CBA85', '#A8C68E', '#7A9A65'],
    light:   ['#B0CC97', '#BFD7A6', '#CAE0B0', '#A0BD85'],
  },
];

// Build SVG defs (gradient per palette color, per variant)
const defs = document.getElementById('grad-defs');
let defsHtml = '';
variants.forEach(v => {
  v.palette.forEach((c, i) => {
    const id = `grad-${v.ver}-${i}`;
    const lc = v.light[i];
    // Generate dark stop by darkening the main
    const dark = darken(c);
    defsHtml += `<radialGradient id="${id}" cx="0.35" cy="0.35" r="0.9">
      <stop offset="0%" stop-color="${lc}"/>
      <stop offset="60%" stop-color="${c}"/>
      <stop offset="100%" stop-color="${dark}"/>
    </radialGradient>`;
  });
});
defs.innerHTML = defsHtml;

function darken(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  const factor = 0.55;
  return '#' + [r, g, b].map(n => Math.max(0, Math.round(n * factor)).toString(16).padStart(2, '0')).join('');
}

function leafletV(gradId, lighter) {
  return `<path d="${LEAFLET_PATH}" fill="url(#${gradId})"/>
    <path d="M -4.5 -10 Q 0 -8 4.5 -10" stroke="${lighter}" stroke-width="0.9" fill="none" opacity="0.65" stroke-linecap="round"/>`;
}

function threeLeafSvg(verId, c1Idx, c2Idx, lighter1, lighter2, scale, rot) {
  const size = Math.round(38 * scale);
  return `<svg width="${size}" height="${size}" viewBox="0 0 38 38" style="transform:rotate(${rot}deg);">
    <g transform="translate(19,21)">
      <path d="M 0 0 Q 2 9 -1 18" fill="none" stroke="#3A5530" stroke-width="1.4" stroke-linecap="round" opacity="0.85"/>
      <g transform="rotate(0)">${leafletV(`grad-${verId}-${c1Idx}`, lighter1)}</g>
      <g transform="rotate(120)">${leafletV(`grad-${verId}-${c2Idx}`, lighter2)}</g>
      <g transform="rotate(-120)">${leafletV(`grad-${verId}-${c1Idx}`, lighter1)}</g>
    </g>
  </svg>`;
}

function rand(a, b) { return a + Math.random() * (b - a); }
function pick(arr) { return Math.floor(Math.random() * arr.length); }

const grid = document.getElementById('grid');
grid.innerHTML = variants.map(v => `
  <div class="card">
    <div class="head"><span class="ver">${v.ver}</span><span class="name">${v.name}</span></div>
    <div class="desc">${v.desc}</div>
    <div class="preview" data-id="${v.ver}" style="background:${v.bg};"></div>
    <div class="swatches">
      ${v.palette.map(c => `<div class="swatch" style="background:${c};" title="${c}"></div>`).join('')}
    </div>
  </div>
`).join('');

// Render mini fields
variants.forEach(v => {
  const container = grid.querySelector(`[data-id="${v.ver}"]`);
  const COLS = 8, ROWS = 11;
  const cellW = 100 / COLS, cellH = 100 / ROWS;
  let html = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cx = (c + 0.5) * cellW + (Math.random() - 0.5) * cellW * 0.5;
      const cy = (r + 0.5) * cellH + (Math.random() - 0.5) * cellH * 0.5;
      const c1 = pick(v.palette), c2 = pick(v.palette);
      const scale = rand(0.35, 0.5);
      const rot = rand(-180, 180);
      html += `<div class="clover-mini" style="left:${cx}%;top:${cy}%;transform:translate(-50%,-50%);">
        ${threeLeafSvg(v.ver, c1, c2, v.light[c1], v.light[c2], scale, rot)}
      </div>`;
    }
  }
  container.innerHTML = html;
});
</script>

</body>
</html>
