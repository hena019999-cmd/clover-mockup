<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>🎨 클로버·배경 색 시안 10가지</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css" />
<style>
  :root {
    --moss: #6B8E5A;
    --leaf-deep: #4A6B3F;
    --paper: #F5F1E6;
    --ivory: #FFFCF2;
    --greige: #9C8E7C;
    --gold: #D4AF37;
    --ink: #2D3A26;
    --ink-soft: #5A6B4F;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 1080px;
    margin: 0 auto;
    padding: 32px 16px 80px;
  }
  header {
    text-align: center;
    margin-bottom: 28px;
  }
  header .eyebrow {
    font-size: 12px;
    color: var(--moss);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 10px;
  }
  header h1 {
    font-size: 24px;
    font-weight: 700;
    margin: 0 0 10px;
    letter-spacing: -0.02em;
  }
  header p {
    font-size: 13px;
    color: var(--ink-soft);
    margin: 0;
    line-height: 1.55;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }
  @media (min-width: 700px) {
    .grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (min-width: 1000px) {
    .grid { grid-template-columns: repeat(4, 1fr); }
  }

  .card {
    background: var(--ivory);
    border: 1px solid rgba(107, 142, 90, 0.15);
    border-radius: 16px;
    padding: 14px;
    box-shadow: 0 4px 16px rgba(74, 107, 63, 0.05);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .card .head {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .card .ver {
    font-size: 10px;
    color: var(--greige);
    letter-spacing: 0.12em;
    font-weight: 600;
  }
  .card .name {
    font-size: 13px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .card .desc {
    font-size: 10px;
    color: var(--ink-soft);
    line-height: 1.4;
  }
  .swatches {
    display: flex;
    gap: 4px;
    margin-top: 4px;
  }
  .swatch {
    width: 18px; height: 18px;
    border-radius: 4px;
    box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.1);
  }
  .preview {
    aspect-ratio: 3 / 4;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
  }
  .preview .clover-mini {
    position: absolute;
    transform-origin: center;
    pointer-events: none;
  }
  .preview .clover-mini svg {
    filter: drop-shadow(0 1px 1.5px rgba(0,0,0,0.4));
  }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute;" aria-hidden="true">
  <defs id="grad-defs"></defs>
</svg>

<div class="wrap">

<header>
  <div class="eyebrow">COLOR PALETTE VARIANTS</div>
  <h1>🎨 클로버 + 배경 색 시안 10가지</h1>
  <p>각 카드는 배경/클로버 색 조합과 빽빽한 미리보기를 보여줍니다.<br/>마음에 드는 번호 알려주시면 게임에 적용합니다.</p>
</header>

<div class="grid" id="grid"></div>

</div>

<script>
const LEAFLET_PATH = "M 0 -2 C -3 -3 -8 -5 -10 -9 C -12 -13 -10 -17 -6 -17 C -3 -17 -1 -15 0 -12 C 1 -15 3 -17 6 -17 C 10 -17 12 -13 10 -9 C 8 -5 3 -3 0 -2 Z";

// 10 color variants (BRIGHTER) — bg + clover palette + lighter shades
const variants = [
  {
    ver: 'C1', name: '연한 라임',
    desc: '연두빛 봄 잔디 + 라임 클로버. 가볍고 밝음.',
    bg: 'radial-gradient(ellipse 60% 50% at 25% 25%, rgba(200, 232, 152, 0.7), transparent 65%), radial-gradient(ellipse at 75% 80%, #B5D898 0%, transparent 60%), linear-gradient(160deg, #C5DEA8 0%, #95BC72 100%)',
    palette: ['#90C870', '#A2D87A', '#B5E08C', '#7DB05A'],
    light:   ['#B5DC95', '#C7E5A2', '#D4ECB5', '#A0CB7E'],
  },
  {
    ver: 'C2', name: '봄 새싹',
    desc: '신선한 새싹 그린. 막 돋아난 풀잎.',
    bg: 'radial-gradient(ellipse 55% 40% at 25% 25%, rgba(180, 230, 142, 0.7), transparent 65%), radial-gradient(ellipse at 80% 80%, #A8D082 0%, transparent 60%), linear-gradient(150deg, #B8DC95 0%, #8FB868 100%)',
    palette: ['#85C25A', '#98CE6A', '#ACDA7C', '#74B048'],
    light:   ['#ADD683', '#BCDF94', '#CCE7A6', '#9EC56F'],
  },
  {
    ver: 'C3', name: '여름 잔디',
    desc: '활기찬 여름 풀 + 진해진 라임. 풍성하지만 밝음.',
    bg: 'radial-gradient(ellipse 60% 50% at 30% 25%, #95C76A, transparent 60%), radial-gradient(ellipse at 75% 80%, #75A848, transparent 60%), linear-gradient(155deg, #88BC58 0%, #6EA340 100%)',
    palette: ['#5E9B38', '#74B048', '#8AC25C', '#4F8830'],
    light:   ['#86BB60', '#9BCD75', '#AED88A', '#76AA52'],
  },
  {
    ver: 'C4', name: '아침 안개',
    desc: '부드러운 회녹색. 안개 낀 아침 정원.',
    bg: 'radial-gradient(ellipse 60% 50% at 30% 30%, #DCEAC8, transparent 65%), radial-gradient(ellipse at 75% 80%, #B0C898, transparent 60%), linear-gradient(150deg, #C8DCAE 0%, #92B074 100%)',
    palette: ['#92B074', '#A4C088', '#B5CF9A', '#7E9C60'],
    light:   ['#BDD2A0', '#CADBB0', '#D5E2BC', '#A4BC85'],
  },
  {
    ver: 'C5', name: '황금 햇살',
    desc: '따뜻한 햇빛 + 라임 골드. 봄날 오후.',
    bg: 'radial-gradient(ellipse 60% 50% at 25% 25%, rgba(232, 200, 100, 0.4), transparent 60%), radial-gradient(ellipse at 80% 80%, #A8C870, transparent 55%), linear-gradient(160deg, #B5C880 0%, #8AAA50 100%)',
    palette: ['#88B855', '#9CC868', '#AED878', '#789E40'],
    light:   ['#B0CE85', '#C0D896', '#CFE2A6', '#9CBC68'],
  },
  {
    ver: 'C6', name: '신선한 숲',
    desc: '시원하지만 밝은 숲 그린. 햇살 통과.',
    bg: 'radial-gradient(ellipse 60% 50% at 30% 25%, #98C588, transparent 60%), radial-gradient(ellipse at 80% 80%, #6EA478, transparent 55%), linear-gradient(160deg, #88BC8E 0%, #5E9870 100%)',
    palette: ['#6BA078', '#80B58A', '#94C89C', '#558870'],
    light:   ['#95C5A2', '#A8D2B2', '#BBDCC0', '#7CAA90'],
  },
  {
    ver: 'C7', name: '클래식 모스',
    desc: '무난한 모스 그린. 한 톤 더 밝게.',
    bg: 'radial-gradient(ellipse 60% 50% at 30% 25%, #95C078, transparent 60%), radial-gradient(ellipse at 80% 80%, #7AA058, transparent 55%), linear-gradient(150deg, #88B068 0%, #689040 100%)',
    palette: ['#7AAB58', '#88BD68', '#9CCC7A', '#6A9848'],
    light:   ['#9EC180', '#AED092', '#BCDBA5', '#8FB370'],
  },
  {
    ver: 'C8', name: '연한 올리브',
    desc: '밝은 올리브. 따뜻하고 차분.',
    bg: 'radial-gradient(ellipse 60% 50% at 25% 25%, #C8D58A, transparent 60%), radial-gradient(ellipse at 80% 80%, #A4B068, transparent 55%), linear-gradient(160deg, #B0BC78 0%, #8A9650 100%)',
    palette: ['#9AA850', '#A8B560', '#B6C272', '#88963F'],
    light:   ['#BCC880', '#C7D292', '#D2DCA3', '#AEBA70'],
  },
  {
    ver: 'C9', name: '이끼 그린',
    desc: '밝게 보정한 이끼색. 어둡지 않으면서 차분.',
    bg: 'radial-gradient(ellipse 60% 50% at 30% 25%, #88B070, transparent 60%), radial-gradient(ellipse at 80% 80%, #618848, transparent 55%), linear-gradient(160deg, #7AA058 0%, #5C8038 100%)',
    palette: ['#6EA050', '#80B262', '#92C476', '#5E8C3D'],
    light:   ['#92BB76', '#A4C988', '#B6D69C', '#84A86A'],
  },
  {
    ver: 'C10', name: '파스텔 수채화',
    desc: '파스텔 톤. 부드럽고 친근한 동화책 느낌.',
    bg: 'radial-gradient(ellipse 60% 50% at 25% 25%, #DBE9C0, transparent 65%), radial-gradient(ellipse at 80% 80%, #B8D098, transparent 60%), linear-gradient(150deg, #CADCB0 0%, #A0BC84 100%)',
    palette: ['#A0BD85', '#B0C998', '#BFD4A8', '#90AE74'],
    light:   ['#C8DAB0', '#D3E2BD', '#DCE8C9', '#B5CB9E'],
  },
  // ===== 땅·흙 컨셉 =====
  {
    ver: 'C11', name: '햇살 흙',
    desc: '따뜻한 갈색 흙 + 밝은 라임 클로버. 햇볕 드는 마당.',
    bg: 'radial-gradient(ellipse 60% 50% at 25% 25%, #D4B080, transparent 65%), radial-gradient(ellipse at 80% 80%, #A8855A, transparent 60%), linear-gradient(160deg, #C29766 0%, #8E6E48 100%)',
    palette: ['#88C25A', '#9CD06E', '#AFDC82', '#74AC48'],
    light:   ['#A8D680', '#B8DD92', '#C8E4A4', '#92BD6A'],
  },
  {
    ver: 'C12', name: '진한 흙',
    desc: '진한 갈색 진흙 + 신선한 그린. 강한 대비, 클로버가 도드라짐.',
    bg: 'radial-gradient(ellipse 60% 50% at 30% 25%, #8A6848, transparent 65%), radial-gradient(ellipse at 75% 80%, #5A4028, transparent 60%), linear-gradient(160deg, #735542 0%, #4A3325 100%)',
    palette: ['#7AB85A', '#8EC56A', '#A2D078', '#669A48'],
    light:   ['#9CCC80', '#ADD592', '#BDDDA4', '#88B068'],
  },
  {
    ver: 'C13', name: '모래밭',
    desc: '부드러운 베이지/샌드 + 진한 그린. 따뜻하고 차분.',
    bg: 'radial-gradient(ellipse 60% 50% at 25% 25%, #E8D2A8, transparent 65%), radial-gradient(ellipse at 80% 80%, #C5A87A, transparent 60%), linear-gradient(150deg, #DAC094 0%, #B0966A 100%)',
    palette: ['#5E9038', '#70A048', '#82B058', '#4D7A28'],
    light:   ['#85B25A', '#95BD6E', '#A5C880', '#72A050'],
  },
  {
    ver: 'C14', name: '가을 낙엽',
    desc: '갈색·황색 가을 흙 + 약간 진한 그린. 계절감 + 따뜻함.',
    bg: 'radial-gradient(ellipse 60% 50% at 25% 25%, rgba(212, 165, 90, 0.6), transparent 60%), radial-gradient(ellipse at 75% 80%, #9A7548, transparent 60%), linear-gradient(160deg, #B68658 0%, #7A5530 100%)',
    palette: ['#7BAA50', '#8FB862', '#A2C674', '#6A9740'],
    light:   ['#9DC575', '#ADD085', '#BDDB97', '#88B262'],
  },
];

// Build SVG defs (gradient per palette color, per variant)
const defs = document.getElementById('grad-defs');
let defsHtml = '';
variants.forEach(v => {
  v.palette.forEach((c, i) => {
    const id = `grad-${v.ver}-${i}`;
    const lc = v.light[i];
    // Generate dark stop by darkening the main
    const dark = darken(c);
    defsHtml += `<radialGradient id="${id}" cx="0.35" cy="0.35" r="0.9">
      <stop offset="0%" stop-color="${lc}"/>
      <stop offset="60%" stop-color="${c}"/>
      <stop offset="100%" stop-color="${dark}"/>
    </radialGradient>`;
  });
});
defs.innerHTML = defsHtml;

function darken(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  const factor = 0.55;
  return '#' + [r, g, b].map(n => Math.max(0, Math.round(n * factor)).toString(16).padStart(2, '0')).join('');
}

function leafletV(gradId, lighter) {
  return `<path d="${LEAFLET_PATH}" fill="url(#${gradId})"/>
    <path d="M -4.5 -10 Q 0 -8 4.5 -10" stroke="${lighter}" stroke-width="0.9" fill="none" opacity="0.65" stroke-linecap="round"/>`;
}

function threeLeafSvg(verId, c1Idx, c2Idx, lighter1, lighter2, scale, rot) {
  const size = Math.round(38 * scale);
  return `<svg width="${size}" height="${size}" viewBox="0 0 38 38" style="transform:rotate(${rot}deg);">
    <g transform="translate(19,21)">
      <path d="M 0 0 Q 2 9 -1 18" fill="none" stroke="#3A5530" stroke-width="1.4" stroke-linecap="round" opacity="0.85"/>
      <g transform="rotate(0)">${leafletV(`grad-${verId}-${c1Idx}`, lighter1)}</g>
      <g transform="rotate(120)">${leafletV(`grad-${verId}-${c2Idx}`, lighter2)}</g>
      <g transform="rotate(-120)">${leafletV(`grad-${verId}-${c1Idx}`, lighter1)}</g>
    </g>
  </svg>`;
}

function rand(a, b) { return a + Math.random() * (b - a); }
function pick(arr) { return Math.floor(Math.random() * arr.length); }

const grid = document.getElementById('grid');
grid.innerHTML = variants.map(v => `
  <div class="card">
    <div class="head"><span class="ver">${v.ver}</span><span class="name">${v.name}</span></div>
    <div class="desc">${v.desc}</div>
    <div class="preview" data-id="${v.ver}" style="background:${v.bg};"></div>
    <div class="swatches">
      ${v.palette.map(c => `<div class="swatch" style="background:${c};" title="${c}"></div>`).join('')}
    </div>
  </div>
`).join('');

// Render mini fields
variants.forEach(v => {
  const container = grid.querySelector(`[data-id="${v.ver}"]`);
  const COLS = 8, ROWS = 11;
  const cellW = 100 / COLS, cellH = 100 / ROWS;
  let html = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cx = (c + 0.5) * cellW + (Math.random() - 0.5) * cellW * 0.5;
      const cy = (r + 0.5) * cellH + (Math.random() - 0.5) * cellH * 0.5;
      const c1 = pick(v.palette), c2 = pick(v.palette);
      const scale = rand(0.35, 0.5);
      const rot = rand(-180, 180);
      html += `<div class="clover-mini" style="left:${cx}%;top:${cy}%;transform:translate(-50%,-50%);">
        ${threeLeafSvg(v.ver, c1, c2, v.light[c1], v.light[c2], scale, rot)}
      </div>`;
    }
  }
  container.innerHTML = html;
});
</script>

</body>
</html>
