<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>🌙 밤 정원 — 게임</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css" />
<style>
  :root {
    --bg-deep: #0A1417;
    --bg-mid: #122024;
    --moss-night: #1F3328;
    --moss-mid: #2A4A3D;
    --moss-light: #3D6A52;
    --mint-glow: #B8E4C9;
    --gold: #D4AF37;
    --gold-soft: #E5C76B;
    --firefly: #FFE066;
    --cream: #FFFCF2;
    --ink-soft: #8AA39A;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
    background: #050B0E;
    display: flex;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }
  .frame {
    width: 100%;
    max-width: 420px;
    min-height: 100vh;
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(ellipse at 30% 20%, #1F3328, transparent 55%),
      radial-gradient(ellipse at 80% 90%, #122024, transparent 55%),
      linear-gradient(180deg, #0A1417 0%, #122024 60%, #1B2D2F 100%);
  }

  /* HUD */
  .hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 18px 22px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 20;
    background: linear-gradient(to bottom, rgba(0,0,0,0.3), transparent);
  }
  .timer {
    background: rgba(20, 30, 28, 0.7);
    border: 1px solid rgba(184, 228, 201, 0.2);
    backdrop-filter: blur(12px);
    border-radius: 999px;
    padding: 8px 18px 8px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .timer .ring {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2px solid var(--gold-soft);
    border-right-color: rgba(212,175,55,0.2);
    border-bottom-color: rgba(212,175,55,0.2);
  }
  .timer .time {
    font-size: 16px;
    font-weight: 500;
    color: var(--cream);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }
  .ticket-mini {
    background: rgba(20, 30, 28, 0.7);
    border: 1px solid rgba(184, 228, 201, 0.2);
    backdrop-filter: blur(12px);
    border-radius: 999px;
    padding: 8px 14px;
    font-size: 12px;
    color: var(--mint-glow);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Stars (top sky) */
  .sky-stars { position: absolute; inset: 0 0 50% 0; pointer-events: none; z-index: 1; }
  .star { position: absolute; background: var(--cream); border-radius: 50%; }

  /* Field */
  .field {
    position: absolute;
    inset: 0;
    overflow: hidden;
    z-index: 2;
  }
  .clover {
    position: absolute;
    transform-origin: center;
    opacity: 0.5;
  }
  .clover[data-lucky="1"] {
    opacity: 1;
    filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.7));
  }
  .deco { position: absolute; pointer-events: none; }

  /* Fireflies */
  .firefly {
    position: absolute;
    width: 5px;
    height: 5px;
    background: var(--firefly);
    border-radius: 50%;
    box-shadow: 0 0 14px var(--firefly), 0 0 6px var(--firefly);
    z-index: 3;
    animation: ff-drift 7s ease-in-out infinite;
  }
  @keyframes ff-drift {
    0%, 100% { transform: translate(0, 0); opacity: 0.4; }
    25% { transform: translate(15px, -12px); opacity: 0.95; }
    50% { transform: translate(-8px, -20px); opacity: 0.6; }
    75% { transform: translate(-18px, -5px); opacity: 1; }
  }

  /* Magnifier (warm lantern) */
  .magnifier {
    position: absolute;
    width: 180px;
    height: 180px;
    left: 50%;
    top: 52%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 10;
    filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.4));
  }
  .magnifier .lens {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 4px solid rgba(229, 199, 107, 0.85);
    background:
      radial-gradient(circle at center, rgba(255, 224, 102, 0.18), rgba(212, 175, 55, 0.05) 50%, transparent 75%);
    backdrop-filter: brightness(2.2) saturate(1.3) blur(0.3px);
    -webkit-backdrop-filter: brightness(2.2) saturate(1.3) blur(0.3px);
    box-shadow:
      inset 0 0 40px rgba(255, 224, 102, 0.2),
      inset 0 0 0 1px rgba(255, 252, 242, 0.3),
      0 0 50px rgba(212, 175, 55, 0.3);
  }
  .magnifier .handle {
    position: absolute;
    bottom: -22px;
    right: -10px;
    width: 60px;
    height: 18px;
    background: linear-gradient(135deg, #8B6F3F, #5A4220);
    border-radius: 12px;
    transform: rotate(40deg);
    transform-origin: top left;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), 0 4px 8px rgba(0,0,0,0.4);
  }

  /* Outer dim where lens not present */
  .dim-overlay {
    position: absolute;
    inset: 0;
    background: rgba(5, 11, 14, 0.45);
    z-index: 9;
    pointer-events: none;
    -webkit-mask: radial-gradient(circle 90px at 50% 52%, transparent 86px, black 92px);
    mask: radial-gradient(circle 90px at 50% 52%, transparent 86px, black 92px);
  }

  /* Hint */
  .hint {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20, 30, 28, 0.7);
    border: 1px solid rgba(184, 228, 201, 0.15);
    color: var(--mint-glow);
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    backdrop-filter: blur(12px);
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .hint .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold-soft);
    box-shadow: 0 0 6px var(--gold-soft);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.4); }
  }
</style>
</head>
<body>

<div class="frame">

  <!-- HUD -->
  <div class="hud">
    <div class="timer">
      <div class="ring"></div>
      <div class="time">00:23</div>
    </div>
    <div class="ticket-mini"><span>🎫</span><span>2 / 3</span></div>
  </div>

  <!-- Sky stars -->
  <div class="sky-stars" id="stars"></div>

  <!-- Field with clovers (generated by JS) -->
  <div class="field" id="field"></div>

  <!-- Fireflies -->
  <div class="firefly" style="top:18%;left:14%;animation-delay:0s;"></div>
  <div class="firefly" style="top:32%;right:18%;animation-delay:-2s;"></div>
  <div class="firefly" style="bottom:25%;left:10%;animation-delay:-4s;"></div>
  <div class="firefly" style="bottom:42%;right:12%;animation-delay:-1s;"></div>

  <!-- Dim overlay (warm lantern carve-out) -->
  <div class="dim-overlay"></div>

  <!-- Magnifier (warm lantern) -->
  <div class="magnifier">
    <div class="lens"></div>
    <div class="handle"></div>
  </div>

  <!-- Bottom hint -->
  <div class="hint">
    <span class="dot"></span>
    <span>풀숲을 살펴보세요</span>
  </div>

</div>

<script>
// Stars at top
(function() {
  const stars = document.getElementById('stars');
  for (let i = 0; i < 28; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 0.6;
    s.style.width = size + 'px';
    s.style.height = size + 'px';
    s.style.left = (Math.random() * 100) + '%';
    s.style.top = (Math.random() * 35) + '%';
    s.style.opacity = (Math.random() * 0.6 + 0.3).toFixed(2);
    stars.appendChild(s);
  }
})();

// Generate clover field
(function() {
  const field = document.getElementById('field');
  const COUNT = 130;
  const palette = ['#1F3328', '#2A4A3D', '#34594A', '#3D6A52', '#4A7B62'];
  const fourLeafIndex = 0;
  const fourLeafPos = { x: 0.46, y: 0.52 };

  function rand(min, max) { return min + Math.random() * (max - min); }

  function threeLeaf(c1, c2, scale, rot) {
    const size = Math.round(28 * scale);
    return `
      <svg width="${size}" height="${size}" viewBox="0 0 28 28" style="transform:rotate(${rot}deg);">
        <g transform="translate(14,14)">
          <ellipse cx="0" cy="-6" rx="4.5" ry="6" fill="${c1}"/>
          <ellipse cx="-6" cy="2" rx="6" ry="4.5" fill="${c2}"/>
          <ellipse cx="6" cy="2" rx="6" ry="4.5" fill="${c2}"/>
          <line x1="0" y1="2" x2="0" y2="11" stroke="#0F1F18" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
        </g>
      </svg>
    `;
  }

  function fourLeaf(scale) {
    const size = Math.round(32 * scale);
    return `
      <svg width="${size}" height="${size}" viewBox="0 0 32 32" style="transform:rotate(8deg);">
        <g transform="translate(16,16)">
          <ellipse cx="0" cy="-7" rx="5" ry="6.5" fill="#5A8068"/>
          <ellipse cx="-7" cy="0" rx="6.5" ry="5" fill="#6A9478"/>
          <ellipse cx="7" cy="0" rx="6.5" ry="5" fill="#6A9478"/>
          <ellipse cx="0" cy="7" rx="5" ry="6.5" fill="#4A7058"/>
          <circle cx="0" cy="0" r="2.5" fill="#D4AF37"/>
          <line x1="0" y1="7" x2="0" y2="13" stroke="#0F1F18" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
        </g>
      </svg>
    `;
  }

  for (let i = 0; i < COUNT; i++) {
    const el = document.createElement('div');
    el.className = 'clover';
    let x, y;
    if (i === fourLeafIndex) {
      x = fourLeafPos.x; y = fourLeafPos.y;
      el.innerHTML = fourLeaf(rand(0.95, 1.05));
      el.dataset.lucky = '1';
    } else {
      x = rand(0.04, 0.96);
      y = rand(0.06, 0.92);
      const c1 = palette[Math.floor(Math.random() * palette.length)];
      const c2 = palette[Math.floor(Math.random() * palette.length)];
      const scale = rand(0.7, 1.15);
      const rot = rand(-30, 30);
      el.innerHTML = threeLeaf(c1, c2, scale, rot);
    }
    el.style.left = (x * 100) + '%';
    el.style.top = (y * 100) + '%';
    el.style.transform = 'translate(-50%, -50%)';
    el.style.opacity = String(rand(0.35, 0.65));
    if (i === fourLeafIndex) el.style.opacity = '1';
    field.appendChild(el);
  }

  // Decorative blades
  for (let i = 0; i < 16; i++) {
    const el = document.createElement('div');
    el.className = 'deco';
    el.style.left = (rand(0, 1) * 100) + '%';
    el.style.top = (rand(0, 1) * 100) + '%';
    const h = rand(14, 28);
    const tilt = rand(-25, 25);
    el.innerHTML = `
      <svg width="6" height="${h}" viewBox="0 0 6 ${h}" style="transform:rotate(${tilt}deg);transform-origin:bottom;">
        <path d="M 3 ${h} Q 1 ${h/2} 3 0" stroke="#1F3328" stroke-width="1.5" fill="none" opacity="0.45" stroke-linecap="round"/>
      </svg>
    `;
    field.appendChild(el);
  }
})();
</script>

</body>
</html>
