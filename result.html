<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>🍀 결과</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css" />
<style>
  :root {
    --moss: #6B8E5A;
    --sprout: #8FBC8F;
    --leaf-deep: #4A6B3F;
    --beige: #FAF7F0;
    --ivory: #FFFCF2;
    --paper: #F5F1E6;
    --greige: #9C8E7C;
    --gold: #D4AF37;
    --gold-soft: #E5C76B;
    --ink: #2D3A26;
    --ink-soft: #5A6B4F;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
    background: #1a1f17;
    display: flex;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }
  .frame {
    width: 100%;
    max-width: 420px;
    min-height: 100vh;
    position: relative;
    overflow: hidden;
    /* Blurred field as backdrop */
    background:
      radial-gradient(ellipse at 30% 20%, #7A9C68, transparent 55%),
      radial-gradient(ellipse at 80% 80%, #4A6B3F, transparent 55%),
      linear-gradient(135deg, #6B8E5A 0%, #4A6B3F 100%);
  }
  .frame::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 12% 22%, rgba(255,255,255,0.05) 0, transparent 1.5px),
      radial-gradient(circle at 47% 67%, rgba(255,255,255,0.04) 0, transparent 1.5px),
      radial-gradient(circle at 78% 32%, rgba(0,0,0,0.05) 0, transparent 2px);
    background-size: 90px 90px, 110px 110px, 70px 70px;
    filter: blur(2px);
    opacity: 0.7;
    pointer-events: none;
  }

  /* Dim overlay */
  .dim {
    position: absolute;
    inset: 0;
    background: rgba(20, 28, 18, 0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }

  /* Light burst behind clover */
  .burst {
    position: absolute;
    width: 460px;
    height: 460px;
    left: 50%;
    top: 38%;
    transform: translate(-50%, -50%);
    background:
      radial-gradient(circle, rgba(229, 199, 107, 0.32), transparent 55%);
    pointer-events: none;
    animation: glow 3s ease-in-out infinite;
  }
  @keyframes glow {
    0%, 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
  }

  /* Modal */
  .sheet {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--ivory);
    border-radius: 28px 28px 0 0;
    padding: 0 24px 28px;
    box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.18);
    animation: slideUp .5s cubic-bezier(.2,.9,.3,1.05);
  }
  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .handle {
    width: 36px; height: 4px;
    background: rgba(155, 142, 124, 0.3);
    border-radius: 2px;
    margin: 12px auto 22px;
  }

  /* Hero clover (large, golden frame) */
  .hero {
    text-align: center;
    margin-top: -90px;
    margin-bottom: 24px;
    position: relative;
  }
  .hero .clover-card {
    display: inline-block;
    background:
      radial-gradient(circle at 50% 50%, rgba(229, 199, 107, 0.3), transparent 60%),
      var(--ivory);
    border: 2px solid var(--gold-soft);
    border-radius: 28px;
    padding: 22px;
    box-shadow:
      0 12px 32px rgba(74, 107, 63, 0.18),
      inset 0 0 0 6px rgba(255, 252, 242, 0.5);
    position: relative;
  }
  .hero .clover-card::before {
    content: '';
    position: absolute;
    inset: -10px;
    border-radius: 36px;
    border: 1px solid rgba(229, 199, 107, 0.4);
    pointer-events: none;
  }
  .hero svg {
    display: block;
    animation: gentle-float 4s ease-in-out infinite;
  }
  @keyframes gentle-float {
    0%, 100% { transform: rotate(0); }
    50% { transform: rotate(4deg); }
  }
  .hero .stamp {
    position: absolute;
    top: -8px;
    right: -8px;
    background: var(--gold);
    color: white;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 5px 10px;
    border-radius: 10px;
    transform: rotate(8deg);
    box-shadow: 0 2px 8px rgba(212, 175, 55, 0.4);
  }

  /* Headline */
  .headline {
    text-align: center;
    margin-bottom: 24px;
  }
  .headline .eyebrow {
    font-size: 12px;
    color: var(--moss);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 10px;
  }
  .headline h1 {
    font-size: 24px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.02em;
    margin: 0 0 8px;
    line-height: 1.4;
  }
  .headline h1 .num {
    color: var(--moss);
    font-weight: 800;
  }
  .headline p {
    font-size: 14px;
    color: var(--ink-soft);
    margin: 0;
    line-height: 1.6;
  }

  /* Stats row */
  .info-row {
    display: flex;
    gap: 8px;
    margin-bottom: 22px;
  }
  .info {
    flex: 1;
    background: var(--paper);
    border-radius: 14px;
    padding: 12px 10px;
    text-align: center;
  }
  .info .v {
    font-size: 16px;
    font-weight: 700;
    color: var(--leaf-deep);
    letter-spacing: -0.01em;
  }
  .info .l {
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 2px;
  }

  /* Reward options */
  .rewards {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px;
  }
  .btn-reward {
    width: 100%;
    border: none;
    border-radius: 18px;
    padding: 18px 22px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    text-align: left;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .btn-reward:active { transform: scale(0.99); }

  .btn-primary {
    background: linear-gradient(135deg, var(--moss), var(--leaf-deep));
    color: white;
    box-shadow:
      0 4px 16px rgba(74, 107, 63, 0.25),
      inset 0 1px 0 rgba(255, 255, 255, 0.2);
  }
  .btn-primary .label { display: flex; flex-direction: column; gap: 2px; }
  .btn-primary .main { font-size: 16px; font-weight: 700; }
  .btn-primary .sub { font-size: 11px; opacity: 0.85; font-weight: 400; }
  .btn-primary .amount { font-size: 22px; font-weight: 800; letter-spacing: -0.01em; }
  .btn-primary .amount .x5 {
    display: inline-block;
    background: var(--gold);
    color: var(--leaf-deep);
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 6px;
    margin-left: 6px;
    vertical-align: middle;
  }

  .btn-secondary {
    background: var(--paper);
    color: var(--ink-soft);
    border: 1px solid rgba(155, 142, 124, 0.2);
  }
  .btn-secondary .main {
    font-size: 14px;
    font-weight: 500;
    color: var(--ink-soft);
  }
  .btn-secondary .amount {
    font-size: 15px;
    font-weight: 600;
    color: var(--ink-soft);
  }

  /* Footer */
  .footer-note {
    text-align: center;
    font-size: 11px;
    color: var(--greige);
    padding-top: 4px;
  }
  .footer-note .lucky {
    color: var(--moss);
    font-weight: 500;
  }

  /* Floating sparkles */
  .sparkle {
    position: absolute;
    pointer-events: none;
    font-size: 14px;
    opacity: 0.6;
    animation: sparkle 4s ease-in-out infinite;
  }
  .sparkle.s1 { top: 18%; left: 18%; animation-delay: 0s; }
  .sparkle.s2 { top: 12%; right: 22%; animation-delay: -1.2s; font-size: 12px; }
  .sparkle.s3 { top: 30%; left: 12%; animation-delay: -2.4s; font-size: 16px; }
  .sparkle.s4 { top: 25%; right: 14%; animation-delay: -3.6s; font-size: 12px; }
  @keyframes sparkle {
    0%, 100% { opacity: 0; transform: scale(0.6) rotate(0); }
    50% { opacity: 1; transform: scale(1) rotate(20deg); }
  }
</style>
</head>
<body>

<div class="frame">

  <!-- Blurred field backdrop is already applied -->
  <div class="dim"></div>
  <div class="burst"></div>

  <!-- Sparkles -->
  <div class="sparkle s1">✦</div>
  <div class="sparkle s2">✧</div>
  <div class="sparkle s3">✦</div>
  <div class="sparkle s4">✧</div>

  <!-- Sheet -->
  <div class="sheet">
    <div class="handle"></div>

    <!-- Hero clover -->
    <div class="hero">
      <div class="clover-card">
        <div class="stamp">FOUND</div>
        <svg width="120" height="120" viewBox="0 0 120 120">
          <g transform="translate(60,60)">
            <ellipse cx="0" cy="-22" rx="16" ry="22" fill="#6B8E5A"/>
            <ellipse cx="-22" cy="0" rx="22" ry="16" fill="#7A9C68"/>
            <ellipse cx="22" cy="0" rx="22" ry="16" fill="#7A9C68"/>
            <ellipse cx="0" cy="22" rx="16" ry="22" fill="#5C7D4D"/>
            <ellipse cx="-3" cy="-26" rx="4" ry="6" fill="#A8C99A" opacity="0.6"/>
            <ellipse cx="-26" cy="-3" rx="6" ry="4" fill="#A8C99A" opacity="0.6"/>
            <line x1="0" y1="22" x2="0" y2="42" stroke="#3A5530" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="0" cy="0" r="6" fill="#D4AF37" opacity="0.7"/>
            <circle cx="0" cy="0" r="3" fill="#FFFCF2"/>
          </g>
        </svg>
      </div>
    </div>

    <!-- Headline -->
    <div class="headline">
      <div class="eyebrow">2026 · 4 · 29</div>
      <h1><span class="num">22초</span>만에 발견했어요</h1>
      <p>오늘 좋은 일이 생길 거예요 🍀</p>
    </div>

    <!-- Info row -->
    <div class="info-row">
      <div class="info">
        <div class="v">12개</div>
        <div class="l">총 발견</div>
      </div>
      <div class="info">
        <div class="v">5일</div>
        <div class="l">연속 발견</div>
      </div>
      <div class="info">
        <div class="v">14초</div>
        <div class="l">최고 기록</div>
      </div>
    </div>

    <!-- Reward options -->
    <div class="rewards">
      <button class="btn-reward btn-primary">
        <div class="label">
          <div class="main">📺 광고 보고 5배 받기</div>
          <div class="sub">짧은 광고 영상을 시청해요</div>
        </div>
        <div class="amount">10원<span class="x5">x5</span></div>
      </button>
      <button class="btn-reward btn-secondary">
        <div class="label">
          <div class="main">그냥 받기</div>
        </div>
        <div class="amount">2원</div>
      </button>
    </div>

    <!-- Footer note -->
    <div class="footer-note">
      <span class="lucky">🍀</span> 발견한 네잎클로버는 도감에 자동으로 기록돼요
    </div>

  </div>

</div>

</body>
</html>
