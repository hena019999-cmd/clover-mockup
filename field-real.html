<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>🌿 레퍼런스 스타일 — 빽빽한 클로버 밭</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css" />
<style>
  :root {
    --moss: #6B8E5A;
    --leaf-deep: #4A6B3F;
    --paper: #F5F1E6;
    --ivory: #FFFCF2;
    --greige: #9C8E7C;
    --gold: #D4AF37;
    --ink: #2D3A26;
    --ink-soft: #5A6B4F;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 460px;
    margin: 0 auto;
    padding: 32px 16px 60px;
  }
  header {
    text-align: center;
    margin-bottom: 24px;
  }
  header .eyebrow {
    font-size: 11px;
    color: var(--moss);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 10px;
  }
  header h1 {
    font-size: 22px;
    font-weight: 700;
    margin: 0 0 8px;
    letter-spacing: -0.02em;
  }
  header p {
    font-size: 13px;
    color: var(--ink-soft);
    margin: 0;
    line-height: 1.55;
  }

  .field {
    position: relative;
    width: 100%;
    aspect-ratio: 3 / 4;
    border-radius: 20px;
    overflow: hidden;
    background:
      radial-gradient(ellipse 60% 40% at 30% 25%, rgba(125, 168, 90, 0.35), transparent 60%),
      radial-gradient(ellipse 70% 50% at 75% 80%, rgba(45, 74, 31, 0.4), transparent 60%),
      radial-gradient(ellipse 50% 50% at 15% 85%, rgba(90, 122, 58, 0.3), transparent 60%),
      linear-gradient(160deg, #2D4A1F 0%, #1F2D14 100%);
    box-shadow: 0 8px 32px rgba(74, 107, 63, 0.15);
    cursor: crosshair;
    touch-action: none;
  }
  .field::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 12% 22%, rgba(0,0,0,0.06) 0, transparent 1.5px),
      radial-gradient(circle at 47% 67%, rgba(255,255,255,0.04) 0, transparent 1.5px),
      radial-gradient(circle at 78% 32%, rgba(0,0,0,0.05) 0, transparent 2px);
    background-size: 70px 70px, 110px 110px, 90px 90px;
    pointer-events: none;
    opacity: 0.5;
  }
  .clover {
    position: absolute;
    transform-origin: center;
    pointer-events: none;
    transition: transform .15s ease;
  }
  .clover svg {
    filter: drop-shadow(0 1px 1.5px rgba(0, 0, 0, 0.5));
  }
  .clover.hover {
    z-index: 100;
    transform: translate(-50%, -50%) scale(1.5) !important;
  }
  .clover.hover svg {
    filter: drop-shadow(0 0 0 #FFFCF2) drop-shadow(0 0 0 #FFFCF2) drop-shadow(0 0 1px #FFFCF2) drop-shadow(0 2px 6px rgba(0,0,0,0.5));
  }
  .clover.hover .leaflet-stroke {
    stroke: #FFFCF2 !important;
    stroke-width: 1.5 !important;
  }

  .hint {
    margin-top: 14px;
    text-align: center;
    font-size: 12px;
    color: var(--ink-soft);
  }
  .hint kbd {
    background: var(--ivory);
    border: 1px solid rgba(107, 142, 90, 0.2);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
  }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute;" aria-hidden="true">
  <defs>
    <radialGradient id="leafG-74B655" cx="0.3" cy="0.3" r="0.95">
      <stop offset="0%" stop-color="#B5DC85"/><stop offset="50%" stop-color="#74B655"/><stop offset="100%" stop-color="#3F6B28"/>
    </radialGradient>
    <radialGradient id="leafG-8FCB68" cx="0.3" cy="0.3" r="0.95">
      <stop offset="0%" stop-color="#C9E693"/><stop offset="50%" stop-color="#8FCB68"/><stop offset="100%" stop-color="#557E38"/>
    </radialGradient>
    <radialGradient id="leafG-A2D870" cx="0.3" cy="0.3" r="0.95">
      <stop offset="0%" stop-color="#D8F0A0"/><stop offset="50%" stop-color="#A2D870"/><stop offset="100%" stop-color="#638B40"/>
    </radialGradient>
    <radialGradient id="leafG-9DD460" cx="0.3" cy="0.3" r="0.95">
      <stop offset="0%" stop-color="#D4EC92"/><stop offset="50%" stop-color="#9DD460"/><stop offset="100%" stop-color="#5C8430"/>
    </radialGradient>
    <radialGradient id="leafG-5A8042" cx="0.3" cy="0.3" r="0.95">
      <stop offset="0%" stop-color="#88B964"/><stop offset="50%" stop-color="#5A8042"/><stop offset="100%" stop-color="#2D4A1F"/>
    </radialGradient>
    <radialGradient id="leafG-4A6B3F" cx="0.3" cy="0.3" r="0.95">
      <stop offset="0%" stop-color="#7A9C68"/><stop offset="50%" stop-color="#4A6B3F"/><stop offset="100%" stop-color="#1F2D17"/>
    </radialGradient>
  </defs>
</svg>

<div class="wrap">

<header>
  <div class="eyebrow">REFERENCE STYLE — GAME24</div>
  <h1>🍀 빽빽한 클로버 밭</h1>
  <p>레퍼런스처럼 클로버가 화면을 가득 덮음.<br/>마우스/터치 위치의 클로버가 흰색 테두리 + 1.5배 확대.</p>
</header>

<div class="field" id="field"></div>

<div class="hint">
  <kbd>마우스 이동</kbd> 또는 <kbd>터치 드래그</kbd> — 가장 가까운 클로버 강조
</div>

</div>

<script>
const PALETTE = ['#74B655', '#8FCB68', '#A2D870', '#9DD460', '#5A8042', '#4A6B3F'];
const LEAFLET_PATH = "M 0 0 C -4 -2 -10 -6 -10 -12 C -10 -16 -6 -18 -2 -16 C 0 -14 0 -10 0 -8 C 0 -10 0 -14 2 -16 C 6 -18 10 -16 10 -12 C 10 -6 4 -2 0 0 Z";
function lighter(c) {
  const map = {
    '#74B655': '#A8DC85', '#8FCB68': '#BFE693', '#A2D870': '#D4F0A0', '#9DD460': '#C5EC92',
    '#5A8042': '#88B964', '#4A6B3F': '#7A9C68',
  };
  return map[c] || '#A8DC85';
}
function leaflet(c) {
  return `<path class="leaflet-stroke" d="${LEAFLET_PATH}" fill="url(#leafG-${c.slice(1)})" stroke="#1F2D17" stroke-width="0.5"/>
    <path d="M -4.5 -10 Q 0 -8 4.5 -10" stroke="${lighter(c)}" stroke-width="0.9" fill="none" opacity="0.6" stroke-linecap="round"/>`;
}
function threeLeafSvg(c1, c2, scale, rot) {
  const size = Math.round(38 * scale);
  return `<svg width="${size}" height="${size}" viewBox="0 0 38 38" style="transform:rotate(${rot}deg);">
    <g transform="translate(19,21)">
      <path d="M 0 0 Q 2 9 -1 18" fill="none" stroke="#3A5530" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>
      <g transform="rotate(0)">${leaflet(c1)}</g>
      <g transform="rotate(120)">${leaflet(c2)}</g>
      <g transform="rotate(-120)">${leaflet(c1)}</g>
    </g>
  </svg>`;
}
function fourLeafSvg(scale, rot) {
  const size = Math.round(40 * scale);
  return `<svg width="${size}" height="${size}" viewBox="0 0 40 40" style="transform:rotate(${rot}deg);">
    <g transform="translate(20,22)">
      <path d="M 0 0 Q 2 10 -1 19" fill="none" stroke="#3A5530" stroke-width="1.6" stroke-linecap="round" opacity="0.85"/>
      <g transform="rotate(0)">${leaflet('#8FCB68')}</g>
      <g transform="rotate(90)">${leaflet('#A2D870')}</g>
      <g transform="rotate(180)">${leaflet('#74B655')}</g>
      <g transform="rotate(-90)">${leaflet('#A2D870')}</g>
    </g>
  </svg>`;
}

function rand(a, b) { return a + Math.random() * (b - a); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

const field = document.getElementById('field');
const COUNT = 380;
const cloverData = [];

// Generate dense field — clovers cover everything
for (let i = 0; i < COUNT; i++) {
  const isLucky = (i === 0);
  const x = rand(-2, 102);
  const y = rand(-2, 102);
  const scale = rand(0.55, 0.95);
  const rot = rand(-180, 180);
  const c1 = pick(PALETTE), c2 = pick(PALETTE);
  cloverData.push({ x, y, isLucky, scale, rot, c1, c2 });
}

// Render
const html = cloverData.map((d, i) => {
  const svg = d.isLucky ? fourLeafSvg(d.scale, d.rot) : threeLeafSvg(d.c1, d.c2, d.scale, d.rot);
  return `<div class="clover" data-i="${i}" style="left:${d.x}%;top:${d.y}%;transform:translate(-50%,-50%);">${svg}</div>`;
}).join('');
field.innerHTML += html;

const cloverEls = field.querySelectorAll('.clover');
let hoveredIdx = -1;

function findNearest(px, py) {
  let bestIdx = -1, bestDist = Infinity;
  for (let i = 0; i < cloverData.length; i++) {
    const d = cloverData[i];
    const dx = d.x - px, dy = d.y - py;
    const dist = dx * dx + dy * dy;
    if (dist < bestDist) {
      bestDist = dist;
      bestIdx = i;
    }
  }
  return bestIdx;
}

function setHover(idx) {
  if (idx === hoveredIdx) return;
  if (hoveredIdx >= 0 && cloverEls[hoveredIdx]) {
    cloverEls[hoveredIdx].classList.remove('hover');
  }
  if (idx >= 0 && cloverEls[idx]) {
    cloverEls[idx].classList.add('hover');
  }
  hoveredIdx = idx;
}

function updateFromEvent(e) {
  const rect = field.getBoundingClientRect();
  const isTouch = e.touches && e.touches.length > 0;
  const cx = isTouch ? e.touches[0].clientX : e.clientX;
  const cy = isTouch ? e.touches[0].clientY : e.clientY;
  const px = ((cx - rect.left) / rect.width) * 100;
  const py = ((cy - rect.top) / rect.height) * 100;
  if (px < 0 || px > 100 || py < 0 || py > 100) {
    setHover(-1);
    return;
  }
  setHover(findNearest(px, py));
}

field.addEventListener('mousemove', updateFromEvent);
field.addEventListener('mouseleave', () => setHover(-1));
field.addEventListener('touchstart', (e) => { e.preventDefault(); updateFromEvent(e); }, { passive: false });
field.addEventListener('touchmove', (e) => { e.preventDefault(); updateFromEvent(e); }, { passive: false });
field.addEventListener('touchend', () => setHover(-1));
</script>

</body>
</html>
