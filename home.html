<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>🍀 홈</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css" />
<style>
  :root {
    --moss: #6B8E5A;
    --sprout: #8FBC8F;
    --leaf-deep: #4A6B3F;
    --beige: #FAF7F0;
    --ivory: #FFFCF2;
    --paper: #F5F1E6;
    --greige: #9C8E7C;
    --gold: #D4AF37;
    --ink: #2D3A26;
    --ink-soft: #5A6B4F;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
    background: var(--paper);
    color: var(--ink);
    display: flex;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .frame {
    width: 100%;
    max-width: 420px;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(143,188,143,0.18), transparent 55%),
      radial-gradient(ellipse at 50% 100%, rgba(212,175,55,0.05), transparent 60%),
      var(--ivory);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* paper texture overlay */
  .frame::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(155, 142, 124, 0.04) 0, transparent 1px),
      radial-gradient(circle at 60% 70%, rgba(155, 142, 124, 0.04) 0, transparent 1px),
      radial-gradient(circle at 85% 20%, rgba(155, 142, 124, 0.04) 0, transparent 1px);
    background-size: 60px 60px, 80px 80px, 100px 100px;
    pointer-events: none;
    opacity: 0.6;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 24px 12px;
    position: relative;
    z-index: 1;
  }
  .header .brand {
    font-size: 13px;
    color: var(--ink-soft);
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .icon-btn {
    width: 40px; height: 40px;
    border-radius: 12px;
    background: rgba(143, 188, 143, 0.18);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--leaf-deep);
    font-size: 16px;
    cursor: pointer;
  }

  /* Hero */
  .hero {
    padding: 32px 28px 0;
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .hero .eyebrow {
    font-size: 12px;
    letter-spacing: 0.18em;
    color: var(--moss);
    text-transform: uppercase;
    margin-bottom: 14px;
    font-weight: 600;
  }
  .hero h1 {
    font-size: 26px;
    font-weight: 700;
    line-height: 1.4;
    letter-spacing: -0.02em;
    margin: 0 0 14px;
    color: var(--ink);
  }
  .hero p {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.65;
    margin: 0;
    max-width: 280px;
    margin-left: auto;
    margin-right: auto;
  }

  /* Clover illustration */
  .illust {
    margin: 30px auto 8px;
    width: 200px;
    height: 200px;
    position: relative;
  }
  .illust svg { width: 100%; height: 100%; overflow: visible; }
  .illust .floating-leaf {
    animation: float 4s ease-in-out infinite;
    transform-origin: center;
  }
  .illust .leaf-2 { animation-delay: -1.3s; }
  .illust .leaf-3 { animation-delay: -2.6s; }
  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0); }
    50% { transform: translateY(-6px) rotate(2deg); }
  }
  .illust .glow {
    position: absolute;
    inset: 30px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212,175,55,0.18), transparent 65%);
    z-index: 0;
  }

  /* Ticket */
  .ticket {
    margin: 16px 24px 0;
    background: var(--ivory);
    border: 1px solid rgba(107, 142, 90, 0.15);
    border-radius: 18px;
    padding: 18px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    z-index: 1;
    box-shadow: 0 2px 12px rgba(74, 107, 63, 0.04);
  }
  .ticket .label {
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 4px;
    letter-spacing: 0.02em;
  }
  .ticket .count {
    font-size: 22px;
    font-weight: 700;
    color: var(--leaf-deep);
    letter-spacing: -0.01em;
  }
  .ticket .count .total {
    color: var(--greige);
    font-weight: 400;
    font-size: 16px;
  }
  .ticket .dots {
    display: flex;
    gap: 6px;
  }
  .ticket .dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--moss);
    box-shadow: 0 1px 3px rgba(107, 142, 90, 0.4);
  }
  .ticket .dot.spent {
    background: rgba(155, 142, 124, 0.2);
    box-shadow: none;
  }

  /* CTA */
  .cta-wrap {
    padding: 20px 24px 0;
    position: relative;
    z-index: 1;
  }
  .cta {
    width: 100%;
    height: 60px;
    border: none;
    border-radius: 18px;
    background: linear-gradient(135deg, var(--moss), var(--leaf-deep));
    color: white;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.01em;
    cursor: pointer;
    box-shadow:
      0 4px 16px rgba(74, 107, 63, 0.25),
      inset 0 1px 0 rgba(255, 255, 255, 0.2);
    transition: transform .15s, box-shadow .15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .cta:active {
    transform: translateY(1px);
    box-shadow: 0 2px 8px rgba(74, 107, 63, 0.25);
  }

  /* Stats preview */
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    padding: 24px 24px 20px;
    margin-top: auto;
    position: relative;
    z-index: 1;
  }
  .stat {
    background: rgba(143, 188, 143, 0.1);
    border-radius: 14px;
    padding: 14px 12px;
    text-align: center;
  }
  .stat .v {
    font-size: 18px;
    font-weight: 700;
    color: var(--leaf-deep);
    letter-spacing: -0.02em;
  }
  .stat .l {
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 4px;
  }

  /* Bottom hint */
  .hint {
    text-align: center;
    font-size: 11px;
    color: var(--greige);
    padding: 8px 24px 28px;
    position: relative;
    z-index: 1;
  }
  .hint .dot { color: var(--moss); }

  /* Floating petal decorations */
  .petal {
    position: absolute;
    pointer-events: none;
    opacity: 0.4;
  }
  .petal.p1 { top: 8%; left: 6%; width: 22px; height: 22px; }
  .petal.p2 { top: 14%; right: 8%; width: 18px; height: 18px; }
  .petal.p3 { bottom: 30%; left: 4%; width: 16px; height: 16px; }
  .petal.p4 { bottom: 22%; right: 6%; width: 20px; height: 20px; }
</style>
</head>
<body>

<div class="frame">

  <!-- Decorative petals -->
  <svg class="petal p1" viewBox="0 0 24 24"><circle cx="12" cy="12" r="6" fill="#D4AF37" opacity="0.5"/></svg>
  <svg class="petal p2" viewBox="0 0 24 24"><ellipse cx="12" cy="12" rx="6" ry="3" fill="#8FBC8F" transform="rotate(30 12 12)"/></svg>
  <svg class="petal p3" viewBox="0 0 24 24"><ellipse cx="12" cy="12" rx="5" ry="2.5" fill="#6B8E5A" transform="rotate(-20 12 12)" opacity="0.6"/></svg>
  <svg class="petal p4" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5" fill="#FAF7F0" stroke="#9C8E7C" stroke-width="0.5" opacity="0.7"/></svg>

  <!-- Header -->
  <header class="header">
    <div class="brand">🍀 오늘의 행운</div>
    <button class="icon-btn" aria-label="도감 열기">📔</button>
  </header>

  <!-- Hero -->
  <div class="hero">
    <div class="eyebrow">2026 · 4 · 29 수요일</div>
    <h1>오늘의 행운을<br/>찾아보세요</h1>
    <p>풀숲 어딘가에 숨어있는 네잎클로버클로버TMP.<br/>30초의 잔잔한 몰입을 시작해요.</p>
  </div>

  <!-- Clover illustration -->
  <div class="illust">
    <div class="glow"></div>
    <svg viewBox="0 0 200 200">
      <g transform="translate(100,100)">
        <!-- stem -->
        <path d="M 0 30 Q -3 60 5 90" fill="none" stroke="#4A6B3F" stroke-width="3" stroke-linecap="round"/>
        <!-- 4 leaves -->
        <ellipse class="floating-leaf leaf-1" cx="0" cy="-30" rx="22" ry="28" fill="#6B8E5A"/>
        <ellipse class="floating-leaf leaf-2" cx="-30" cy="0" rx="28" ry="22" fill="#7A9C68"/>
        <ellipse class="floating-leaf leaf-3" cx="30" cy="0" rx="28" ry="22" fill="#7A9C68"/>
        <ellipse class="floating-leaf" cx="0" cy="30" rx="22" ry="28" fill="#5C7D4D" style="animation-delay:-1.9s;"/>
        <!-- highlights -->
        <ellipse cx="-3" cy="-35" rx="6" ry="8" fill="#A8C99A" opacity="0.5"/>
        <ellipse cx="-33" cy="-3" rx="8" ry="6" fill="#A8C99A" opacity="0.5"/>
        <!-- center -->
        <circle cx="0" cy="0" r="6" fill="#D4AF37" opacity="0.7"/>
        <circle cx="0" cy="0" r="3" fill="#FFFCF2"/>
      </g>
    </svg>
  </div>

  <!-- Ticket -->
  <div class="ticket">
    <div>
      <div class="label">오늘의 도전권</div>
      <div class="count">3 <span class="total">/ 3</span></div>
    </div>
    <div class="dots">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </div>

  <!-- CTA -->
  <div class="cta-wrap">
    <button class="cta">
      <span>🎯</span>
      <span>행운 찾기 시작</span>
    </button>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="v">12</div>
      <div class="l">총 발견</div>
    </div>
    <div class="stat">
      <div class="v">4일</div>
      <div class="l">연속 발견</div>
    </div>
    <div class="stat">
      <div class="v">14초</div>
      <div class="l">최고 기록</div>
    </div>
  </div>

  <div class="hint"><span class="dot">✦</span> 매일 자정에 도전권 3장이 새로 충전돼요</div>

</div>

</body>
</html>
